# Profilo di test: DB H2 in-memory.
# Attivato dai test JPA/integration con @ActiveProfiles("test").

spring.datasource.url=jdbc:h2:mem:console-api-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# In test disattiviamo retry e circuit breaker per evitare delay e
# falsi positivi: ogni chiamata e' "one-shot" e propaga immediatamente l'errore.
resilience4j.retry.instances.stampe.max-attempts=1
resilience4j.retry.instances.stampe.wait-duration=0ms
resilience4j.circuitbreaker.instances.stampe.minimum-number-of-calls=2147483647

# Audit in modalita' sincrona nei test: i test che verificano la riga di
# audit la trovano immediatamente nello stesso thread, senza dover attendere.
app.audit.async=false
