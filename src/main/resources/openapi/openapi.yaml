        - $ref: '#/components/parameters/IdDominioFilter'
        - $ref: '#/components/parameters/RagioneSociale'
        - $ref: '#/components/parameters/Abilitato'
      responses:
        '200':
          description: Lista paginata di domini.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      results:
                        type: array
                        items:
                          $ref: '#/components/schemas/DominioSummary'
        '400':
          $ref: '#/components/responses/Problem400'
        '401':
          $ref: '#/components/responses/Problem401'
    post:
      tags:
        - Domini
      operationId: createDominio
      summary: Crea un nuovo dominio.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DominioCreate'
      responses:
        '201':
          description: Dominio creato.
          headers:
            Location:
              description: URI del nuovo dominio.
              schema:
                type: string
            ETag:
              description: Validatore di concorrenza della rappresentazione creata.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dominio'
        '400':
          $ref: '#/components/responses/Problem400'
        '401':
          $ref: '#/components/responses/Problem401'
        '409':
          $ref: '#/components/responses/Problem409'
        '422':
          $ref: '#/components/responses/Problem422'

  /domini/{idDominio}:
    parameters:
      - $ref: '#/components/parameters/IdDominioPath'
    get:
      tags:
        - Domini
      operationId: getDominio
      summary: Dettaglio di un dominio.
      description: |
        Restituisce il dominio identificato da `idDominio`, con header `ETag` da
        rispedire come `If-Match` nelle operazioni di modifica.
      responses:
        '200':
          description: Dettaglio dominio.
          headers:
            ETag:
              description: Validatore di concorrenza della rappresentazione corrente.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dominio'
        '401':
          $ref: '#/components/responses/Problem401'
        '404':
          $ref: '#/components/responses/Problem404'
    put:
      tags:
        - Domini
      operationId: replaceDominio
      summary: Sostituisce un dominio (full update).
      description: |
        Sostituisce integralmente il dominio. Richiede l'header `If-Match` con
        l'`ETag` ottenuto da una GET precedente.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DominioReplace'
      responses:
        '200':
          description: Dominio aggiornato.
          headers:
            ETag:
              description: Nuovo validatore di concorrenza.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dominio'
        '400':
          $ref: '#/components/responses/Problem400'
        '401':
          $ref: '#/components/responses/Problem401'
        '404':
          $ref: '#/components/responses/Problem404'
        '412':
          $ref: '#/components/responses/Problem412'
        '422':
          $ref: '#/components/responses/Problem422'
        '428':
          $ref: '#/components/responses/Problem428'
    patch:
      tags:
        - Domini
      operationId: patchDominio
      summary: Modifica parziale di un dominio (JSON Patch).
      description: |
        Applica una sequenza di operazioni JSON Patch (RFC 6902). Richiede l'header
        `If-Match` con l'`ETag` corrente. La rappresentazione risultante viene
        validata come in una sostituzione completa.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json-patch+json:
            schema:
              $ref: '#/components/schemas/JsonPatch'
      responses:
        '200':
          description: Dominio aggiornato.
          headers:
            ETag:
              description: Nuovo validatore di concorrenza.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dominio'
        '400':
          $ref: '#/components/responses/Problem400'
        '401':
          $ref: '#/components/responses/Problem401'
        '404':
          $ref: '#/components/responses/Problem404'
        '412':
          $ref: '#/components/responses/Problem412'
        '422':
          $ref: '#/components/responses/Problem422'
        '428':
          $ref: '#/components/responses/Problem428'

  /domini/{idDominio}/logo:
    parameters:
      - $ref: '#/components/parameters/IdDominioPath'
    get:
      tags:
        - Domini
      operationId: getDominioLogo
      summary: Logo dell'ente creditore.
      description: |
        Ritorna il logo binario del dominio. Il `Content-Type` viene determinato
        dal contenuto (`image/png` o `image/jpeg`). `404` se il dominio non esiste
        o non ha un logo.
      responses:
        '200':
          description: Logo del dominio.
          headers:
            Cache-Control:
              description: Direttiva di cache del logo.
              schema:
                type: string
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Problem401'
        '404':
          $ref: '#/components/responses/Problem404'
    put:
      tags:
        - Domini
      operationId: replaceDominioLogo
      summary: Carica o sostituisce il logo dell'ente creditore.
      description: |
        Carica il logo binario del dominio. Formati accettati: `image/png`,
        `image/jpeg`. Il tipo effettivo viene verificato dal contenuto: un payload
        non riconosciuto come immagine supportata produce `415`. Dimensione massima
        configurabile (default 256 KB): oltre il limite produce `413`.
      requestBody:
        required: true
        content:
          image/png:
            schema:
              type: string
              format: binary
          image/jpeg:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Logo aggiornato.
        '400':
          $ref: '#/components/responses/Problem400'
        '401':
          $ref: '#/components/responses/Problem401'
        '404':
          $ref: '#/components/responses/Problem404'
        '413':
          $ref: '#/components/responses/Problem413'
        '415':
          $ref: '#/components/responses/Problem415'
    delete:
      tags:
        - Domini
      operationId: deleteDominioLogo
      summary: Rimuove il logo dell'ente creditore.
      description: |
        Rimuove il logo del dominio. Operazione idempotente: ritorna `204` anche se
        il dominio non aveva un logo. Necessaria perche' il logo e' isolato fuori
        dalla rappresentazione del dominio e non puo' essere azzerato via PUT/PATCH
        del dominio.
      responses:
        '204':
          description: Logo rimosso (o gia' assente).
        '401':
          $ref: '#/components/responses/Problem401'
        '404':
          $ref: '#/components/responses/Problem404'

components:
  schemas:

    Problem:
      type: object
      description: RFC 7807 problem details
      required:
        - status
      properties:
        type:
          type: string
          format: uri
          default: about:blank
        title:
          type: string
        status:
          type: integer
          minimum: 100
          maximum: 599
        detail:
          type: string
        instance:
          type: string
          format: uri
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

    Pagination:
      type: object
      description: Metadati di paginazione associati a una risposta paginata.
      required:
        - page
        - limit
        - hasNextPage
      properties:
        page:
          type: integer
          format: int32
          minimum: 1
          description: Numero della pagina corrente (1-based).
        limit:
          type: integer
          format: int32
          minimum: 1
          maximum: 200
          description: Numero massimo di risultati per pagina.
        hasNextPage:
          type: boolean
          description: True se esiste almeno un risultato oltre la pagina corrente.
        totalResults:
          type: integer
          format: int64
          minimum: 0
          description: Numero totale di risultati. Presente solo se la richiesta ha `total=true`.
        totalPages:
          type: integer
          format: int32
          minimum: 0
          description: Numero totale di pagine. Presente solo se la richiesta ha `total=true`.

    PaginatedResponse:
      type: object
      description: |
        Forma comune di tutte le risposte paginate.
        I consumer specializzano `results` via `allOf` con il proprio item type.
        Due modalita' di paginazione mutuamente esclusive a livello di response:
        - **offset** (default): `pagination` valorizzato (page/limit/hasNextPage + opzionali totalResults/totalPages se richiesto `total=true`);
        - **cursor** (opt-in con `?cursor=`): `nextCursor` valorizzato con il cursore della pagina successiva.
        L'esclusione mutua e' enforced dal controller (`?page` + `?cursor` => 400).
      required:
        - results
      properties:
        results:
          type: array
          items: {}
        pagination:
          $ref: '#/components/schemas/Pagination'
        nextCursor:
          type: string
          description: |
            Cursore opaque base64 da rispedire come `?cursor=` per ottenere la
            pagina successiva. Presente solo in modalita' cursor e se esistono altri risultati.

    DominioRef:
      type: object
      required:
        - idDominio
        - ragioneSociale
      properties:
        idDominio:
          type: string
          description: Codice dominio (es. P.IVA 11 cifre).
          example: "12345678901"
        ragioneSociale:
          type: string

    TipoPendenzaRef:
      type: object
      required:
        - idTipoPendenza
        - descrizione
      properties:
        idTipoPendenza:
          type: string
          example: "TARI"
        descrizione:
          type: string

    UnitaOperativaRef:
      type: object
      required:
        - idUnitaOperativa
        - ragioneSociale
      properties:
        idUnitaOperativa:
          type: string
        ragioneSociale:
          type: string

    StatoPendenza:
      type: string
      description: |
        Stato della pendenza in V2.
        Mapping rispetto agli stati V1:
        - V1 `ESEGUITA` -> V2 `PAGATA`
        - V1 `NON_ESEGUITA` -> V2 `NON_PAGATA`
        - V1 `ESEGUITA_PARZIALE` -> V2 `PAGATA_PARZIALE`
        - V1 `INCASSATA` -> V2 `RICONCILIATA`
        - V1 `ANNULLATA`/`SCADUTA`/`ANOMALA` -> identici in V2.
      enum:
        - NON_PAGATA
        - PAGATA
        - PAGATA_PARZIALE
        - ANNULLATA
        - SCADUTA
        - RICONCILIATA
        - ANOMALA

    StatoVocePendenza:
      type: string
      enum:
        - NON_PAGATA
        - PAGATA
        - ANOMALA

    StatoAvviso:
      type: string
      description: |
        Stato dell'avviso di pagamento. Mapping V1 -> V2:
        - `Pagato` -> `PAGATO`
        - `Non pagato` -> `NON_PAGATO`
        - `Scaduto` -> `SCADUTO`
        - `Annullato` -> `ANNULLATO`
      enum:
        - PAGATO
        - NON_PAGATO
        - SCADUTO
        - ANNULLATO

    LinguaSecondaria:
      type: string
      description: |
        Lingua secondaria per province bilingui.

        Semantica equivalente a V1 (`it.govpay.core.beans.tracciati.LinguaSecondaria`):
        - **`DE`/`EN`/`FR`/`SL`**: forza la stampa bilingue con la lingua indicata,
          sovrascrivendo l'eventuale default impostato sulla pendenza.
        - **`NONE`**: forza la stampa solo in italiano, sovrascrivendo l'eventuale
          default bilingue impostato sulla pendenza. In V1 questo valore era
          denominato `FALSE`; e' stato rinominato in `NONE` in V2 per leggibilita',
          la semantica e' identica.
        - **Parametro assente**: usa il default della pendenza (`proprietaPendenza.linguaSecondaria`).
          Se anche il default e' assente, l'avviso e' in solo italiano.
      enum:
        - DE
        - EN
        - FR
        - SL
        - NONE

    PendenzaExpand:
      type: string
      description: Sotto-tree opt-in espandibile nel dettaglio pendenza via `?expand=`.
      enum:
        - datiAllegati
        - proprieta

    Link:
      type: object
      description: Hyperlink in stile HAL.
      required:
        - href
      properties:
        href:
          type: string
        type:
          type: string

    PendenzaLinks:
      type: object
      description: |
        Collezione di hyperlink relativi alla pendenza. Le chiavi `informazioniDebitore`
        e `ricevute` sono sempre presenti; `avviso` e' condizionale (vedi descrizione di `Pendenza`).
        Lo schema accetta `additionalProperties` di tipo `Link` per consentire l'aggiunta
        non-breaking di chiavi future (rpp, pagamenti, allegati, ...).
      required:
        - informazioniDebitore
        - ricevute
      properties:
        informazioniDebitore:
          $ref: '#/components/schemas/Link'
        avviso:
          $ref: '#/components/schemas/Link'
        ricevute:
          $ref: '#/components/schemas/Link'
      additionalProperties:
        $ref: '#/components/schemas/Link'

    VocePendenza:
      type: object
      description: Voce di una pendenza (embedded inline in `Pendenza`, max 5 per pendenza).
      required:
        - idVocePendenza
        - importo
        - descrizione
        - stato
      properties:
        idVocePendenza:
          type: string
        indice:
          type: integer
          format: int32
          minimum: 1
        importo:
          type: number
          format: double
        descrizione:
          type: string
        stato:
          $ref: '#/components/schemas/StatoVocePendenza'
        descrizioneCausaleRPT:
          type: string
        contabilita:
          type: string
        datiAllegati:
          type: string
        metadata:
          type: string
        dominio:
          allOf:
            - $ref: '#/components/schemas/DominioRef'
          nullable: true
          description: |
            Dominio (ente creditore) della singola voce, per pendenze
            multibeneficiario. Null per voci single-beneficiario: in tal caso
            vale il `dominio` della pendenza. Quando presente vince sul dominio
            della pendenza ai fini dell'incasso di questa voce.
        dettaglio:
          description: |
            Tipo effettivo della voce. La struttura del payload cambia in base al
            tipo: riferimento a entrata anagrafica, incasso esplicito, o bollo telematico.
          oneOf:
            - $ref: '#/components/schemas/VocePendenzaEntrataAnagrafica'
            - $ref: '#/components/schemas/VocePendenzaIncassoDiretto'
            - $ref: '#/components/schemas/VocePendenzaBolloTelematico'
          discriminator:
            propertyName: tipoVoce
            mapping:
              ENTRATA_ANAGRAFICA: '#/components/schemas/VocePendenzaEntrataAnagrafica'
              INCASSO_DIRETTO: '#/components/schemas/VocePendenzaIncassoDiretto'
              BOLLO_TELEMATICO: '#/components/schemas/VocePendenzaBolloTelematico'

    VocePendenzaEntrataAnagrafica:
      description: Dettagli di incasso tramite riferimento a una entrata configurata in anagrafica GovPay.
      type: object
      required:
        - tipoVoce
        - codEntrata
      properties:
        tipoVoce:
          type: string
          pattern: '^ENTRATA_ANAGRAFICA$'
          description: Discriminatore, valore fisso `ENTRATA_ANAGRAFICA`.
        codEntrata:
          type: string
          pattern: '^[a-zA-Z0-9\-_\.]{1,35}$'
          description: Codice della entrata configurata in anagrafica.

    VocePendenzaIncassoDiretto:
      description: Dettagli di incasso espliciti (IBAN + contabilita').
      type: object
      required:
        - tipoVoce
        - ibanAccredito
        - tipoContabilita
        - codiceContabilita
      properties:
        tipoVoce:
          type: string
          pattern: '^INCASSO_DIRETTO$'
          description: Discriminatore, valore fisso `INCASSO_DIRETTO`.
        ibanAccredito:
          type: string
          example: IT60X0542811101000000123456
          description: IBAN su cui accreditare l'importo della voce.
        ibanAppoggio:
          type: string
          example: IT60X0542811101000000123456
          description: IBAN di appoggio (opzionale, per fallback).
        tipoContabilita:
          $ref: '#/components/schemas/TipoContabilita'
        codiceContabilita:
          type: string
          example: '3321'
          description: Codifica del capitolo di bilancio.

    VocePendenzaBolloTelematico:
      description: Dati di un bollo telematico (marca da bollo digitale).
      type: object
      required:
        - tipoVoce
        - tipoBollo
        - hashDocumento
        - provinciaResidenza
      properties:
        tipoVoce:
          type: string
          pattern: '^BOLLO_TELEMATICO$'
          description: Discriminatore, valore fisso `BOLLO_TELEMATICO`.
        tipoBollo:
          type: string
          enum:
            - "Imposta di bollo"
          description: Tipologia di bollo digitale.
        hashDocumento:
          type: string
          description: Digest in base64 del documento informatico associato alla marca da bollo.
        provinciaResidenza:
          type: string
          pattern: '^[A-Z]{2}$'
          example: RM
          description: Sigla automobilistica della provincia di residenza del soggetto pagatore.

    TipoContabilita:
      type: string
      description: |
        Tipo di contabilita' della voce. Valori allineati a V1 (codifica DB a 1 char:
        CAPITOLO=0, SPECIALE=1, SIOPE=2, SRTP_ESCLUSA_RAVV_OPEROSO=6,
        SRTP_ESCLUSA_ALTRO_OPERATORE=7, SRTP_ESCLUSA=8, ALTRO=9).
      enum:
        - CAPITOLO
        - SPECIALE
        - SIOPE
        - SRTP_ESCLUSA_RAVV_OPEROSO
        - SRTP_ESCLUSA_ALTRO_OPERATORE
        - SRTP_ESCLUSA
        - ALTRO

    PendenzaSummary:
      type: object
      description: |
        Proiezione leggera della pendenza, usata nelle liste paginate. Non espone
        dati personali del debitore (per quelli vedi `/informazioniDebitore`).
      required:
        - idA2A
        - idPendenza
        - stato
        - dominio
        - tipoPendenza
        - importo
        - causale
        - dataUltimoAggiornamento
      properties:
        idA2A:
          type: string
          pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        idPendenza:
          type: string
          pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        stato:
          $ref: '#/components/schemas/StatoPendenza'
        dominio:
          $ref: '#/components/schemas/DominioRef'
        tipoPendenza:
          $ref: '#/components/schemas/TipoPendenzaRef'
        unitaOperativa:
          allOf:
            - $ref: '#/components/schemas/UnitaOperativaRef'
          nullable: true
          description: Null per pendenze non assegnate a una unita' operativa.
        importo:
          type: number
          format: double
        numeroAvviso:
          type: string
          pattern: '^[0-9]{18}$'
        iuvAvviso:
          type: string
        causale:
          type: string
          description: Causale completa della pendenza.
        dataScadenza:
          type: string
          format: date-time
        dataValidita:
          type: string
          format: date
        dataUltimoAggiornamento:
          type: string
          format: date-time
        dataUltimaModificaAca:
          type: string
          format: date-time
        dataUltimaComunicazioneAca:
          type: string
          format: date-time

    Pendenza:
      description: |
        Dettaglio canonico di una pendenza. Composizione: `PendenzaSummary` + dati
        propri + `voci` embedded inline (max 5 items, sempre presente) + sub-tree
        opt-in (`datiAllegati`, `proprieta`) + `_links` (con `informazioniDebitore`
        sempre presente).
        `soggettoPagatore` NON e' nel body: per i dati anagrafici/contatti del
        debitore il client chiama `/informazioniDebitore`.
      allOf:
        - $ref: '#/components/schemas/PendenzaSummary'
        - type: object
          required:
            - voci
            - _links
          properties:
            descrizione:
              type: string
            documento:
              type: string
            direzione:
              type: string
            divisione:
              type: string
            voci:
              type: array
              minItems: 1
              maxItems: 5
              items:
                $ref: '#/components/schemas/VocePendenza'
            datiAllegati:
              type: string
              description: Presente solo se richiesto via `?expand=datiAllegati`.
            proprieta:
              type: string
              description: Presente solo se richiesto via `?expand=proprieta`.
            _links:
              $ref: '#/components/schemas/PendenzaLinks'

    Avviso:
      type: object
      description: |
        Metadati locali dell'avviso di pagamento associato a una pendenza
        (variante `application/json` dell'endpoint `/avviso`).
      required:
        - idDominio
        - numeroAvviso
        - importo
        - stato
      properties:
        idDominio:
          type: string
        numeroAvviso:
          type: string
          pattern: '^[0-9]{18}$'
        importo:
          type: number
          format: double
        descrizione:
          type: string
        dataValidita:
          type: string
          format: date-time
        dataScadenza:
          type: string
          format: date-time
        tassonomiaAvviso:
          type: string
        qrcode:
          type: string
        barcode:
          type: string
        stato:
          $ref: '#/components/schemas/StatoAvviso'

    PspRef:
      type: object
      description: Identificativi minimi del Prestatore di Servizi di Pagamento (PSP).
      required:
        - idPsp
      properties:
        idPsp:
          type: string
        ragioneSociale:
          type: string

    Ricevuta:
      description: |
        Dettaglio canonico di una Ricevuta Telematica (RT). Estende
        `RicevutaSummary` con la conversione JSON della richiesta (`rpt`) e della
        ricevuta (`rt`) pagoPA, il riferimento alla pendenza e gli hyperlink ai
        sub-resource. Espone l'anagrafica del soggetto pagatore annidata in
        `rpt`/`rt`: ogni risposta 200 viene tracciata in `gp_audit`.
      allOf:
        - $ref: '#/components/schemas/RicevutaSummary'
        - type: object
          required:
            - rt
            - _links
          properties:
            rpt:
              type: object
              additionalProperties: true
              nullable: true
              description: |
                Conversione JSON della Richiesta di Pagamento Telematica inviata a
                pagoPA (standard `ctRichiestaPagamentoTelematico` / paForNode a
                seconda della versione). È `null` quando la RPT non è disponibile
                (RT acquisita in standin, senza messaggio di richiesta): divergenza
                voluta, l'unico campo del dettaglio che può mancare.
            rt:
              type: object
              additionalProperties: true
              description: |
                Conversione JSON della Ricevuta Telematica restituita da pagoPA
                (standard `ctRicevutaTelematica` / paForNode a seconda della
                versione). Sempre presente: il dettaglio è esposto solo per RT
                effettivamente disponibili.
            segnalazioni:
              type: array
              description: Eventuali eventi/note del Nodo associati alla RT.
              items:
                $ref: '#/components/schemas/Segnalazione'
            pendenza:
              $ref: '#/components/schemas/PendenzaRef'
            _links:
              $ref: '#/components/schemas/RicevutaLinks'

    Segnalazione:
      type: object
      description: Evento o nota emessi dal Nodo durante l'elaborazione della RT.
      properties:
        data:
          type: string
          format: date-time
        codice:
          type: string
        descrizione:
          type: string

    PendenzaRef:
      type: object
      description: Riferimento minimale alla pendenza associata a una RT.
      required:
        - idA2A
        - idPendenza
      properties:
        idA2A:
          type: string
        idPendenza:
          type: string
        causaleBreve:
          type: string

    RicevutaLinks:
      type: object
      description: |
        Hyperlink relativi alla ricevuta. `rpt` e `rt` sono sempre presenti
        (sub-resource di dettaglio); `pendenza` è condizionale (presente solo se
        la RT è associata a una pendenza nota).
      required:
        - rpt
        - rt
      properties:
        pendenza:
          $ref: '#/components/schemas/Link'
        rpt:
          $ref: '#/components/schemas/Link'
        rt:
          $ref: '#/components/schemas/Link'
      additionalProperties:
        $ref: '#/components/schemas/Link'

    RicevutaSummary:
      type: object
      description: |
        Proiezione leggera (metadata-only) di una ricevuta telematica (RT), usata
        nelle liste. Puramente tecnico-finanziaria: non espone alcun dato personale
        (no anagrafica debitore, no causale), quindi la lista non genera audit GDPR.
        La tupla `idDominio`, `iuv`, `idRicevuta` identifica la RT per la
        navigazione ai sub-resource di dettaglio.

        I campi sempre valorizzati sono `required`; `codPsp`, `versione`,
        `descrizioneStato` e `importo` possono mancare (sorgenti nullable).
      required:
        - idDominio
        - iuv
        - idRicevuta
        - dataPagamento
        - stato
      properties:
        idDominio:
          type: string
          description: Codice fiscale dell'ente creditore (11 cifre).
        iuv:
          type: string
          description: Identificativo Univoco Versamento.
        idRicevuta:
          type: string
          description: Identificativo della ricevuta (era `ccp` in V1).
        dataPagamento:
          type: string
          format: date-time
        codPsp:
          type: string
          description: Codice del PSP che ha emesso la RT.
        versione:
          type: string
          description: Versione del protocollo pagoPA della RT (es. `1.0`, `2.0`).
        stato:
          type: string
          description: Stato della ricevuta (stringa nativa V1, es. `RT_ACCETTATA_PA`).
        descrizioneStato:
          type: string
          description: Dettaglio human-readable dello stato.
        importo:
          type: number
          format: double
          description: Importo totale pagato. Dato finanziario, non personale.

    Soggetto:
      type: object
      description: |
        Anagrafica e contatti del soggetto pagatore (debitore). Esposto solo
        attraverso `/informazioniDebitore` per minimizzare l'esposizione di dati
        personali. Ogni 200 viene tracciato in `gp_audit`.
      required:
        - tipo
        - identificativo
        - anagrafica
      properties:
        tipo:
          type: string
          description: F = persona fisica, G = persona giuridica.
          enum:
            - F
            - G
        identificativo:
          type: string
          description: CF (16 char) o PIVA (11 cifre).
        anagrafica:
          type: string
          description: Nome+cognome (F) o ragione sociale (G).
        indirizzo:
          type: string
        civico:
          type: string
        cap:
          type: string
        localita:
          type: string
        provincia:
          type: string
        nazione:
          type: string
          description: Codice ISO 3166-1 alpha-2.
        email:
          type: string
          format: email
        cellulare:
          type: string

    AutenticazioneEnum:
      type: string
      description: |
        Codice del metodo di autenticazione con cui l'utenza si e' autenticata.
        Valori allineati alla property `authType` delle chain V1 di GovPay
        e all'enum `it.govpay.common.auth.spi.AuthType` della libreria
        `govpay-common-auth`.
      enum:
        - BASIC
        - LDAP
        - FORM
        - SSL
        - SSL_HEADER
        - HEADER
        - API_KEY
        - SPID
        - SESSION
        - OAUTH2
        - PUBLIC
      example: FORM

    RuoloRef:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          description: Identificativo del ruolo (es. nome del role configurato).
          example: AMMINISTRATORE

    Acl:
      type: object
      required:
        - servizio
        - autorizzazioni
      description: |
        Entry ACL appiattita: per ciascun servizio elencato, l'utenza ha la lista
        di autorizzazioni associate. Replica lo schema V1 `aclPost`.
      properties:
        servizio:
          type: string
          description: Servizio oggetto dell'autorizzazione.
          enum:
            - "Anagrafica PagoPA"
            - "Anagrafica Creditore"
            - "Anagrafica Applicazioni"
            - "Anagrafica Ruoli"
            - "Pagamenti"
            - "Pendenze"
            - "Rendicontazioni e Incassi"
            - "Giornale degli Eventi"
            - "Configurazione e manutenzione"
        autorizzazioni:
          type: array
          items:
            type: string
            enum:
              - R
              - W
          example:
            - R
            - W
        ruolo:
          type: string
          description: |
            Identificativo del ruolo che ha originato la entry ACL (opzionale,
            valorizzato solo se l'ACL deriva da un ruolo del catalogo invece
            che da un'ACL diretta sull'utenza).
          example: AMMINISTRATORE

    Profilo:
      type: object
      required:
        - nome
        - autenticazione
      description: |
        Profilo dell'utenza autenticata corrente. Ritornato da `GET /profilo` e
        come body di `POST /auth/login`.

        Domini, tipiPendenza e ruoli espongono singolarmente la collezione di
        risorse su cui l'utenza puo' operare; quando l'utenza ha autorizzazione
        "star" (tutti i domini / tutti i tipi pendenza), la collezione contiene
        un singolo elemento placeholder con id `*` e descrizione `Tutti`
        (compatibilita' V1).
      properties:
        nome:
          type: string
          description: Display name dell'utenza (per OPERATORE = operatori.nome).
          example: Mario Rossi
        principal:
          type: string
          description: Identificativo dell'utenza autenticata (username, CF, subject del cert, ...).
          example: m.rossi
        autenticazione:
          $ref: '#/components/schemas/AutenticazioneEnum'
        domini:
          type: array
          description: Domini su cui l'utenza puo' operare.
          items:
            $ref: '#/components/schemas/DominioRef'
        tipiPendenza:
          type: array
          description: Tipi pendenza su cui l'utenza puo' operare.
          items:
            $ref: '#/components/schemas/TipoPendenzaRef'
        ruoli:
          type: array
          description: Ruoli assegnati all'utenza.
          items:
            $ref: '#/components/schemas/RuoloRef'
        acl:
          type: array
          description: ACL appiattite dell'utenza (servizio + autorizzazioni R/W).
          items:
            $ref: '#/components/schemas/Acl'

    RichiestaLogin:
      type: object
      required:
        - username
        - password
      description: |
        Body di `POST /auth/login`. Sostituisce il flusso V1 (Basic + first
        request) con un endpoint dedicato che accetta credenziali in JSON.
      properties:
        username:
          type: string
          example: m.rossi
        password:
          type: string
          format: password

    MetodoAutenticazione:
      type: object
      required:
        - codice
      description: |
        Metodo di autenticazione esposto dalla console-api, con l'URL da cui
        il client puo' iniziare il flow corrispondente.
      properties:
        codice:
          $ref: '#/components/schemas/AutenticazioneEnum'
        etichetta:
          type: string
          description: Label localizzata per la UI (es. "Username e password", "SPID", "Carta CIE").
          example: Username e password
        urlInizio:
          type: string
          description: |
            URL per iniziare il flow (es. `/auth/login` per FORM, redirect IdP per SPID).
            Puo' essere relativo (URL interno) o assoluto (redirect esterno).
          example: /auth/login
        descrizione:
          type: string
          description: Descrizione opzionale del metodo, per UI di selezione.

    MetodiAutenticazione:
      type: object
      required:
        - metodi
      description: |
        Risposta di `GET /auth/methods`. Endpoint pubblico che permette al
        frontend di renderizzare i pulsanti di login appropriati senza
        hard-coding dei metodi server-side.
      properties:
        metodi:
          type: array
          items:
            $ref: '#/components/schemas/MetodoAutenticazione'

    IntermediarioSummary:
      type: object
      description: Proiezione leggera dell'intermediario, usata nelle liste paginate.
      required:
        - idIntermediario
        - denominazione
        - abilitato
      properties:
        idIntermediario:
          type: string
