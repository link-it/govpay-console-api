        - tipoContabilita
        - codiceContabilita
      properties:
        idEntrata:
          type: string
          description: Codice identificativo della tipologia di entrata.
          maxLength: 255
        descrizione:
          type: string
          maxLength: 255
        tipoContabilita:
          $ref: '#/components/schemas/TipoContabilita'
        codiceContabilita:
          type: string
          maxLength: 255

    EntrataReplace:
      type: object
      description: Body per la sostituzione completa di una tipologia di entrata (`idEntrata` dal path).
      required:
