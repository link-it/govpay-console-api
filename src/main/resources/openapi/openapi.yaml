      operationId: getConnettorePagopaRecuperoRt
      summary: Connettore pagoPA Recupero RT dell'intermediario (senza credenziali).
      description: |
        Lo slot del connettore esiste sempre: se non ancora configurato la GET
        restituisce un connettore con `abilitato=false` e campi vuoti.
      responses:
        '200':
          description: Connettore pagoPA Recupero RT.
          headers:
            ETag:
              description: Validatore di concorrenza della configurazione corrente.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnettoreIntermediarioPagopaRecuperoRt'
        '401':
          $ref: '#/components/responses/Problem401'
        '404':
          $ref: '#/components/responses/Problem404'
    put:
      tags:
        - Connettori
      operationId: replaceConnettorePagopaRecuperoRt
      summary: Sostituisce la configurazione del connettore pagoPA Recupero RT (senza credenziali).
      description: |
        Aggiorna la configurazione del connettore (credenziali escluse). Richiede
        l'header `If-Match` con l'`ETag` ottenuto da una GET precedente.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnettoreIntermediarioPagopaRecuperoRt'
      responses:
        '200':
          description: Connettore aggiornato.
          headers:
            ETag:
              description: Nuovo validatore di concorrenza.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnettoreIntermediarioPagopaRecuperoRt'
        '400':
          $ref: '#/components/responses/Problem400'
        '401':
          $ref: '#/components/responses/Problem401'
        '404':
          $ref: '#/components/responses/Problem404'
        '412':
          $ref: '#/components/responses/Problem412'
        '428':
          $ref: '#/components/responses/Problem428'
  /intermediari/{idIntermediario}/connettori/pagopa-recupero-rt/credenziali:
    parameters:
      - $ref: '#/components/parameters/IdIntermediarioPath'
    put:
      tags:
        - Connettori
      operationId: putCredenzialiConnettorePagopaRecuperoRt
      summary: Imposta le credenziali del connettore pagoPA Recupero RT (write-only).
      description: |
        Aggiorna le credenziali del connettore. Non vengono mai restituite dalle GET.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnettoreCredenziali'
      responses:
        '204':
          description: Credenziali aggiornate.
        '400':
          $ref: '#/components/responses/Problem400'
        '401':
          $ref: '#/components/responses/Problem401'
        '404':
          $ref: '#/components/responses/Problem404'

components:
  schemas:

    Problem:
      type: object
      description: RFC 7807 problem details
      required:
        - status
      properties:
        type:
          type: string
          format: uri
          default: about:blank
        title:
          type: string
        status:
          type: integer
          minimum: 100
          maximum: 599
        detail:
          type: string
        instance:
          type: string
          format: uri
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

    Pagination:
      type: object
      description: Metadati di paginazione associati a una risposta paginata.
      required:
        - page
        - limit
        - hasNextPage
      properties:
        page:
          type: integer
          format: int32
          minimum: 1
          description: Numero della pagina corrente (1-based).
        limit:
          type: integer
          format: int32
          minimum: 1
          maximum: 200
          description: Numero massimo di risultati per pagina.
        hasNextPage:
          type: boolean
          description: True se esiste almeno un risultato oltre la pagina corrente.
        totalResults:
          type: integer
          format: int64
          minimum: 0
          description: Numero totale di risultati. Presente solo se la richiesta ha `total=true`.
        totalPages:
          type: integer
          format: int32
          minimum: 0
          description: Numero totale di pagine. Presente solo se la richiesta ha `total=true`.

    PaginatedResponse:
      type: object
      description: |
        Forma comune di tutte le risposte paginate.
        I consumer specializzano `results` via `allOf` con il proprio item type.
        Due modalita' di paginazione mutuamente esclusive a livello di response:
        - **offset** (default): `pagination` valorizzato (page/limit/hasNextPage + opzionali totalResults/totalPages se richiesto `total=true`);
        - **cursor** (opt-in con `?cursor=`): `nextCursor` valorizzato con il cursore della pagina successiva.
        L'esclusione mutua e' enforced dal controller (`?page` + `?cursor` => 400).
      required:
        - results
      properties:
        results:
          type: array
          items: {}
        pagination:
          $ref: '#/components/schemas/Pagination'
        nextCursor:
          type: string
          description: |
            Cursore opaque base64 da rispedire come `?cursor=` per ottenere la
            pagina successiva. Presente solo in modalita' cursor e se esistono altri risultati.

    DominioRef:
      type: object
      required:
        - idDominio
        - ragioneSociale
      properties:
        idDominio:
          type: string
          description: Codice dominio (es. P.IVA 11 cifre).
          example: "12345678901"
        ragioneSociale:
          type: string

    TipoPendenzaRef:
      type: object
      required:
        - idTipoPendenza
        - descrizione
      properties:
        idTipoPendenza:
          type: string
          example: "TARI"
        descrizione:
          type: string

    UnitaOperativaRef:
      type: object
      required:
        - idUnitaOperativa
        - ragioneSociale
      properties:
        idUnitaOperativa:
          type: string
        ragioneSociale:
          type: string

    TipoPendenza:
      type: string
      enum:
        - DOVUTA
        - SPONTANEA

    StatoPendenza:
      type: string
      description: |
        Stato della pendenza in V2.
        Mapping rispetto agli stati V1:
        - V1 `ESEGUITA` -> V2 `PAGATA`
        - V1 `NON_ESEGUITA` -> V2 `NON_PAGATA`
        - V1 `ESEGUITA_PARZIALE` -> V2 `PAGATA_PARZIALE`
        - V1 `INCASSATA` -> V2 `RICONCILIATA`
        - V1 `ANNULLATA`/`SCADUTA`/`ANOMALA` -> identici in V2.
      enum:
        - NON_PAGATA
        - PAGATA
        - PAGATA_PARZIALE
        - ANNULLATA
        - SCADUTA
        - RICONCILIATA
        - ANOMALA

    StatoVocePendenza:
      type: string
      enum:
        - NON_PAGATA
        - PAGATA
        - ANOMALA

    StatoAvviso:
      type: string
      description: |
        Stato dell'avviso di pagamento. Mapping V1 -> V2:
        - `Pagato` -> `PAGATO`
        - `Non pagato` -> `NON_PAGATO`
        - `Scaduto` -> `SCADUTO`
        - `Annullato` -> `ANNULLATO`
      enum:
        - PAGATO
        - NON_PAGATO
        - SCADUTO
        - ANNULLATO

    LinguaSecondaria:
      type: string
      description: |
        Lingua secondaria per province bilingui.

        Semantica equivalente a V1 (`it.govpay.core.beans.tracciati.LinguaSecondaria`):
        - **`DE`/`EN`/`FR`/`SL`**: forza la stampa bilingue con la lingua indicata,
          sovrascrivendo l'eventuale default impostato sulla pendenza.
        - **`NONE`**: forza la stampa solo in italiano, sovrascrivendo l'eventuale
          default bilingue impostato sulla pendenza. In V1 questo valore era
          denominato `FALSE`; e' stato rinominato in `NONE` in V2 per leggibilita',
          la semantica e' identica.
        - **Parametro assente**: usa il default della pendenza (`proprietaPendenza.linguaSecondaria`).
          Se anche il default e' assente, l'avviso e' in solo italiano.
      enum:
        - DE
        - EN
        - FR
        - SL
        - NONE

    PendenzaExpand:
      type: string
      description: Sotto-tree opt-in espandibile nel dettaglio pendenza via `?expand=`.
      enum:
        - datiAllegati
        - proprieta

    Link:
      type: object
      description: Hyperlink in stile HAL.
      required:
        - href
      properties:
        href:
          type: string
        type:
          type: string

    PendenzaLinks:
      type: object
      description: |
        Collezione di hyperlink relativi alla pendenza. La chiave `informazioniDebitore`
        e' sempre presente; `avviso`/`ricevuta` sono condizionali (vedi descrizione di `Pendenza`).
        Lo schema accetta `additionalProperties` di tipo `Link` per consentire l'aggiunta
        non-breaking di chiavi future (rpp, pagamenti, allegati, ...).
      required:
        - informazioniDebitore
      properties:
        informazioniDebitore:
          $ref: '#/components/schemas/Link'
        avviso:
          $ref: '#/components/schemas/Link'
        ricevuta:
          $ref: '#/components/schemas/Link'
      additionalProperties:
        $ref: '#/components/schemas/Link'

    VocePendenza:
      type: object
      description: Voce di una pendenza (embedded inline in `Pendenza`, max 5 per pendenza).
      required:
        - idVocePendenza
        - indice
        - importo
        - stato
      properties:
        idVocePendenza:
          type: string
        indice:
          type: integer
          format: int32
          minimum: 1
        importo:
          type: number
          format: double
        descrizione:
          type: string
        stato:
          $ref: '#/components/schemas/StatoVocePendenza'
        descrizioneCausaleRPT:
          type: string
        contabilita:
          type: string
        datiAllegati:
          type: string
        metadata:
          type: string

    PendenzaSummary:
      type: object
      description: |
        Proiezione leggera della pendenza, usata nelle liste paginate.
      required:
        - idA2A
        - idPendenza
        - stato
        - tipo
        - anomalo
        - verificato
        - dominio
        - tipoPendenza
        - importo
        - importoPagato
        - dataUltimoAggiornamento
        - idDebitore
      properties:
        idA2A:
          type: string
          pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        idPendenza:
          type: string
          pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        stato:
          $ref: '#/components/schemas/StatoPendenza'
        tipo:
          $ref: '#/components/schemas/TipoPendenza'
        anomalo:
          type: boolean
        verificato:
          type: boolean
        dominio:
          $ref: '#/components/schemas/DominioRef'
        tipoPendenza:
          $ref: '#/components/schemas/TipoPendenzaRef'
        unitaOperativa:
          allOf:
            - $ref: '#/components/schemas/UnitaOperativaRef'
          nullable: true
          description: Null per pendenze non assegnate a una unita' operativa.
        importo:
          type: number
          format: double
        importoPagato:
          type: number
          format: double
        dataScadenza:
          type: string
          format: date-time
        dataUltimoAggiornamento:
          type: string
          format: date-time
        numeroAvviso:
          type: string
          pattern: '^[0-9]{18}$'
        iuvAvviso:
          type: string
        causaleBreve:
          type: string
          maxLength: 80
        idDebitore:
          type: string
          description: Solo CF/PIVA del soggetto pagatore. I dati anagrafici completi sono su `/informazioniDebitore`.

    Pendenza:
      description: |
        Dettaglio canonico di una pendenza. Composizione: `PendenzaSummary` + dati
        propri + `voci` embedded inline (max 5 items, sempre presente) + sub-tree
        opt-in (`datiAllegati`, `proprieta`) + `_links` (con `informazioniDebitore`
        sempre presente).
        `soggettoPagatore` NON e' nel body: per i dati anagrafici/contatti del
        debitore il client chiama `/informazioniDebitore`.
      allOf:
        - $ref: '#/components/schemas/PendenzaSummary'
        - type: object
          required:
            - voci
            - _links
          properties:
            descrizione:
              type: string
            tassonomia:
              type: string
            tassonomiaAvviso:
              type: string
            documento:
              type: string
            direzione:
              type: string
            divisione:
              type: string
            voci:
              type: array
              minItems: 1
              maxItems: 5
              items:
                $ref: '#/components/schemas/VocePendenza'
            datiAllegati:
              type: string
              description: Presente solo se richiesto via `?expand=datiAllegati`.
            proprieta:
              type: string
              description: Presente solo se richiesto via `?expand=proprieta`.
            _links:
              $ref: '#/components/schemas/PendenzaLinks'

    Avviso:
      type: object
      description: |
        Metadati locali dell'avviso di pagamento associato a una pendenza
        (variante `application/json` dell'endpoint `/avviso`).
      required:
        - idDominio
        - numeroAvviso
        - importo
        - stato
      properties:
        idDominio:
          type: string
        numeroAvviso:
          type: string
          pattern: '^[0-9]{18}$'
        importo:
          type: number
          format: double
        descrizione:
          type: string
        dataValidita:
          type: string
          format: date-time
        dataScadenza:
          type: string
          format: date-time
        tassonomiaAvviso:
          type: string
        qrcode:
          type: string
        barcode:
          type: string
        stato:
          $ref: '#/components/schemas/StatoAvviso'

    PspRef:
      type: object
      description: Identificativi minimi del Prestatore di Servizi di Pagamento (PSP).
      required:
        - idPsp
      properties:
        idPsp:
          type: string
        ragioneSociale:
          type: string

    Ricevuta:
      type: object
      description: |
        Metadati locali della Ricevuta Telematica (RT) associata a una pendenza
        (variante `application/json` dell'endpoint `/ricevuta`). Strategia "RT
        principale": l'ultima riuscita ordinata per `dataPagamento DESC`.
      required:
        - iuv
        - ccp
        - idDominio
        - dataPagamento
        - importoTotalePagato
      properties:
        iuv:
          type: string
        ccp:
          type: string
        idDominio:
          type: string
        dataPagamento:
          type: string
          format: date-time
        importoTotalePagato:
          type: number
          format: double
        psp:
          $ref: '#/components/schemas/PspRef'
        riferimentoTransazione:
          type: string
        causale:
          type: string
        singoliVersamenti:
          type: array
          items:
            type: object
            properties:
              iur:
                type: string
              importo:
                type: number
                format: double
              causale:
                type: string

    Soggetto:
      type: object
      description: |
        Anagrafica e contatti del soggetto pagatore (debitore). Esposto solo
        attraverso `/informazioniDebitore` per minimizzare l'esposizione di dati
        personali. Ogni 200 viene tracciato in `gp_audit`.
      required:
        - tipo
        - identificativo
        - anagrafica
      properties:
        tipo:
          type: string
          description: F = persona fisica, G = persona giuridica.
          enum:
            - F
            - G
        identificativo:
          type: string
          description: CF (16 char) o PIVA (11 cifre).
        anagrafica:
          type: string
          description: Nome+cognome (F) o ragione sociale (G).
        indirizzo:
          type: string
        civico:
          type: string
        cap:
          type: string
        localita:
          type: string
        provincia:
          type: string
        nazione:
          type: string
          description: Codice ISO 3166-1 alpha-2.
        email:
          type: string
          format: email
        cellulare:
          type: string

    AutenticazioneEnum:
      type: string
      description: |
        Codice del metodo di autenticazione con cui l'utenza si e' autenticata.
        Valori allineati alla property `authType` delle chain V1 di GovPay
        e all'enum `it.govpay.common.auth.spi.AuthType` della libreria
        `govpay-common-auth`.
      enum:
        - BASIC
        - LDAP
        - FORM
        - SSL
        - SSL_HEADER
        - HEADER
        - API_KEY
        - SPID
        - SESSION
        - OAUTH2
        - PUBLIC
      example: FORM

    RuoloRef:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          description: Identificativo del ruolo (es. nome del role configurato).
          example: AMMINISTRATORE

    Acl:
      type: object
      required:
        - servizio
        - autorizzazioni
      description: |
        Entry ACL appiattita: per ciascun servizio elencato, l'utenza ha la lista
        di autorizzazioni associate. Replica lo schema V1 `aclPost`.
      properties:
        servizio:
          type: string
          description: Servizio oggetto dell'autorizzazione.
          enum:
            - "Anagrafica PagoPA"
            - "Anagrafica Creditore"
            - "Anagrafica Applicazioni"
            - "Anagrafica Ruoli"
            - "Pagamenti"
            - "Pendenze"
            - "Rendicontazioni e Incassi"
            - "Giornale degli Eventi"
            - "Configurazione e manutenzione"
        autorizzazioni:
          type: array
          items:
            type: string
            enum:
              - R
              - W
          example:
            - R
            - W
        ruolo:
          type: string
          description: |
            Identificativo del ruolo che ha originato la entry ACL (opzionale,
            valorizzato solo se l'ACL deriva da un ruolo del catalogo invece
            che da un'ACL diretta sull'utenza).
          example: AMMINISTRATORE

    Profilo:
      type: object
      required:
        - nome
        - autenticazione
      description: |
        Profilo dell'utenza autenticata corrente. Ritornato da `GET /profilo` e
        come body di `POST /auth/login`.

        Domini, tipiPendenza e ruoli espongono singolarmente la collezione di
        risorse su cui l'utenza puo' operare; quando l'utenza ha autorizzazione
        "star" (tutti i domini / tutti i tipi pendenza), la collezione contiene
        un singolo elemento placeholder con id `*` e descrizione `Tutti`
        (compatibilita' V1).
      properties:
        nome:
          type: string
          description: Display name dell'utenza (per OPERATORE = operatori.nome).
          example: Mario Rossi
        principal:
          type: string
          description: Identificativo dell'utenza autenticata (username, CF, subject del cert, ...).
          example: m.rossi
        autenticazione:
          $ref: '#/components/schemas/AutenticazioneEnum'
        domini:
          type: array
          description: Domini su cui l'utenza puo' operare.
          items:
            $ref: '#/components/schemas/DominioRef'
        tipiPendenza:
          type: array
          description: Tipi pendenza su cui l'utenza puo' operare.
          items:
            $ref: '#/components/schemas/TipoPendenzaRef'
        ruoli:
          type: array
          description: Ruoli assegnati all'utenza.
          items:
            $ref: '#/components/schemas/RuoloRef'
        acl:
          type: array
          description: ACL appiattite dell'utenza (servizio + autorizzazioni R/W).
          items:
            $ref: '#/components/schemas/Acl'

    RichiestaLogin:
      type: object
      required:
        - username
        - password
      description: |
        Body di `POST /auth/login`. Sostituisce il flusso V1 (Basic + first
        request) con un endpoint dedicato che accetta credenziali in JSON.
      properties:
        username:
          type: string
          example: m.rossi
        password:
          type: string
          format: password

    MetodoAutenticazione:
      type: object
      required:
        - codice
      description: |
        Metodo di autenticazione esposto dalla console-api, con l'URL da cui
        il client puo' iniziare il flow corrispondente.
      properties:
        codice:
          $ref: '#/components/schemas/AutenticazioneEnum'
        etichetta:
          type: string
          description: Label localizzata per la UI (es. "Username e password", "SPID", "Carta CIE").
          example: Username e password
        urlInizio:
          type: string
          description: |
            URL per iniziare il flow (es. `/auth/login` per FORM, redirect IdP per SPID).
            Puo' essere relativo (URL interno) o assoluto (redirect esterno).
          example: /auth/login
        descrizione:
          type: string
          description: Descrizione opzionale del metodo, per UI di selezione.

    MetodiAutenticazione:
      type: object
      required:
        - metodi
      description: |
        Risposta di `GET /auth/methods`. Endpoint pubblico che permette al
        frontend di renderizzare i pulsanti di login appropriati senza
        hard-coding dei metodi server-side.
      properties:
        metodi:
          type: array
          items:
            $ref: '#/components/schemas/MetodoAutenticazione'

    IntermediarioSummary:
      type: object
      description: Proiezione leggera dell'intermediario, usata nelle liste paginate.
      required:
        - idIntermediario
        - denominazione
        - abilitato
      properties:
        idIntermediario:
          type: string
          description: Codice identificativo dell'intermediario.
          pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        denominazione:
          type: string
          maxLength: 255
        abilitato:
          type: boolean

    Intermediario:
      type: object
      description: Dettaglio canonico di un intermediario pagoPA.
      required:
        - idIntermediario
        - denominazione
        - principalPagoPa
        - abilitato
      properties:
        idIntermediario:
          type: string
          description: Codice identificativo dell'intermediario.
          pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        denominazione:
          type: string
          description: Ragione sociale dell'intermediario pagoPA.
          maxLength: 255
        principalPagoPa:
          type: string
          description: Principal con cui sono autenticate le richieste ricevute da pagoPA.
          maxLength: 4000
        abilitato:
          type: boolean

    IntermediarioCreate:
      type: object
      description: Body per la creazione di un intermediario.
      required:
        - idIntermediario
        - denominazione
        - principalPagoPa
        - abilitato
      properties:
        idIntermediario:
          type: string
          description: Codice identificativo dell'intermediario.
          pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        denominazione:
          type: string
          maxLength: 255
        principalPagoPa:
          type: string
          maxLength: 4000
        abilitato:
          type: boolean

    IntermediarioReplace:
      type: object
      description: Body per la sostituzione completa di un intermediario (`idIntermediario` dal path).
      required:
        - denominazione
        - principalPagoPa
        - abilitato
      properties:
        denominazione:
          type: string
          maxLength: 255
        principalPagoPa:
          type: string
          maxLength: 4000
        abilitato:
          type: boolean

    VersioneStazione:
      type: string
      description: Versione del protocollo pagoPA della stazione.
      enum:
        - V1
        - V2

    StazioneSummary:
      type: object
      description: Proiezione leggera della stazione, usata nelle liste paginate.
      required:
        - idStazione
        - versione
        - abilitato
      properties:
        idStazione:
          type: string
          description: Codice identificativo della stazione (`{idIntermediario}_{applicationCode}`).
          pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        versione:
          $ref: '#/components/schemas/VersioneStazione'
        abilitato:
          type: boolean

    Stazione:
      type: object
      description: Dettaglio canonico di una stazione.
      required:
        - idStazione
        - versione
        - abilitato
        - domini
      properties:
        idStazione:
          type: string
          description: Codice identificativo della stazione (`{idIntermediario}_{applicationCode}`).
          pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        versione:
          $ref: '#/components/schemas/VersioneStazione'
        abilitato:
          type: boolean
        domini:
          type: array
          description: Domini associati alla stazione (sola lettura).
          items:
            $ref: '#/components/schemas/DominioRef'

    StazioneCreate:
      type: object
      description: Body per la creazione di una stazione.
      required:
        - idStazione
        - versione
        - abilitato
      properties:
        idStazione:
          type: string
          description: |
            Codice identificativo della stazione. Formato
            `{idIntermediario}_{applicationCode}` con `applicationCode` tra 1 e 99.
          pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        versione:
          $ref: '#/components/schemas/VersioneStazione'
        abilitato:
          type: boolean

    StazioneReplace:
      type: object
      description: Body per la sostituzione completa di una stazione (`idStazione` dal path).
      required:
        - versione
        - abilitato
      properties:
        versione:
          $ref: '#/components/schemas/VersioneStazione'
        abilitato:
          type: boolean

    TipoAutenticazioneConnettore:
      type: string
      description: |
        Tipo di autenticazione del connettore verso pagoPA. Determina quali
        campi di `ConnettoreAuth` (e quali credenziali) sono significativi.
      enum:
        - NONE
        - HTTPBASIC
        - SSL
        - HEADER
        - APIKEY
        - OAUTH2

    SslTipo:
      type: string
      description: Modalita' SSL quando `tipoAutenticazione=SSL`.
      enum:
        - CLIENT
        - SERVER

    ConnettoreAuth:
      type: object
      description: |
        Parametri di autenticazione del connettore, **senza credenziali**
        (password, segreti, subscription key sono gestiti dall'endpoint
        `/credenziali`).
      required:
        - tipoAutenticazione
      properties:
        tipoAutenticazione:
          $ref: '#/components/schemas/TipoAutenticazioneConnettore'
        username:
          type: string
          description: Username HTTP Basic (la password e' una credenziale).
        sslTipo:
          $ref: '#/components/schemas/SslTipo'
        ksLocation:
          type: string
        ksType:
          type: string
        tsLocation:
          type: string
        tsType:
          type: string
        sslType:
          type: string
        headerName:
          type: string
          description: Nome dell'header per `tipoAutenticazione=HEADER` (il valore e' una credenziale).
        apiId:
          type: string
          description: ID per `tipoAutenticazione=APIKEY` (la api key e' una credenziale).
        clientId:
          type: string
          description: Client id per `tipoAutenticazione=OAUTH2` (il client secret e' una credenziale).
        scope:
          type: string
        urlTokenEndpoint:
          type: string

    ConnettoreIntermediarioPagopa:
      type: object
      description: Connettore pagoPA (PDD) dell'intermediario. Le credenziali non sono incluse.
      required:
        - abilitato
        - auth
      properties:
        abilitato:
          type: boolean
        urlRPT:
          type: string
        auth:
          $ref: '#/components/schemas/ConnettoreAuth'

    ConnettoreIntermediarioPagopaAca:
      type: object
      description: Connettore pagoPA ACA dell'intermediario. Le credenziali non sono incluse.
      required:
        - abilitato
        - auth
      properties:
        abilitato:
          type: boolean
        url:
          type: string
        abilitaGDE:
          type: boolean
        auth:
          $ref: '#/components/schemas/ConnettoreAuth'

    ConnettoreIntermediarioPagopaGpd:
      type: object
      description: Connettore pagoPA GPD dell'intermediario. Le credenziali non sono incluse.
      required:
        - abilitato
        - auth
      properties:
        abilitato:
          type: boolean
        url:
          type: string
        abilitaGDE:
          type: boolean
        auth:
          $ref: '#/components/schemas/ConnettoreAuth'

    ConnettoreIntermediarioPagopaFr:
      type: object
      description: Connettore pagoPA FR dell'intermediario. Le credenziali non sono incluse.
      required:
        - abilitato
        - auth
      properties:
        abilitato:
          type: boolean
        url:
          type: string
        abilitaGDE:
          type: boolean
        auth:
          $ref: '#/components/schemas/ConnettoreAuth'

    ConnettoreIntermediarioPagopaBackofficeEc:
      type: object
      description: Connettore pagoPA Backoffice EC dell'intermediario. Le credenziali non sono incluse.
      required:
        - abilitato
        - auth
      properties:
        abilitato:
          type: boolean
        url:
          type: string
        abilitaGDE:
          type: boolean
        auth:
          $ref: '#/components/schemas/ConnettoreAuth'

    ConnettoreIntermediarioPagopaRecuperoRt:
      type: object
      description: Connettore pagoPA Recupero RT dell'intermediario. Le credenziali non sono incluse.
      required:
        - abilitato
        - auth
      properties:
        abilitato:
          type: boolean
        url:
          type: string
        abilitaGDE:
          type: boolean
        auth:
          $ref: '#/components/schemas/ConnettoreAuth'

    ConnettoreCredenziali:
      type: object
      description: |
        Credenziali del connettore (write-only). Non vengono mai restituite dalle GET.
        Sono significative solo le credenziali coerenti col `tipoAutenticazione` del connettore.
      properties:
        subscriptionKey:
          type: string
        password:
          type: string
          description: Password HTTP Basic.
        ksPassword:
          type: string
        tsPassword:
          type: string
        ksPKeyPasswd:
          type: string
        headerValue:
          type: string
          description: Valore dell'header per `tipoAutenticazione=HEADER`.
        apiKey:
          type: string
          description: Api key per `tipoAutenticazione=APIKEY`.
        clientSecret:
          type: string
          description: Client secret per `tipoAutenticazione=OAUTH2`.

    JsonPatchOperation:
      type: object
      description: Singola operazione JSON Patch (RFC 6902).
      required:
        - op
        - path
      properties:
        op:
          type: string
          enum:
            - add
            - remove
            - replace
            - move
            - copy
            - test
        path:
          type: string
          description: JSON Pointer (RFC 6901) del campo destinazione.
        value:
          description: Valore dell'operazione (per `add`, `replace`, `test`).
        from:
          type: string
          description: JSON Pointer sorgente (per `move`, `copy`).

    JsonPatch:
      type: array
      description: Documento JSON Patch (RFC 6902), sequenza ordinata di operazioni.
      items:
        $ref: '#/components/schemas/JsonPatchOperation'

  responses:

    Problem400:
      description: Richiesta non valida.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Problem401:
      description: Autenticazione mancante o non valida.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Problem404:
      description: Risorsa non trovata.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Problem412:
      description: '`If-Match` non corrisponde all''`ETag` corrente.'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Problem428:
      description: Header `If-Match` mancante.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

  parameters:

    Page:
      name: page
      in: query
      required: false
      description: Numero della pagina richiesta (1-based).
      schema:
        type: integer
        format: int32
        minimum: 1
        default: 1

    Limit:
      name: limit
      in: query
      required: false
      description: Numero massimo di risultati per pagina.
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 200
        default: 25

    Sort:
      name: sort
      in: query
      required: false
      description: |
        Ordinamento dei risultati. Formato `campo:asc|desc`, separati da virgola
        per ordinamenti multipli. I campi ammessi sono documentati per ogni risorsa.
      schema:
        type: string

    Total:
      name: total
      in: query
      required: false
      description: |
        Se true, la risposta include `totalResults` e `totalPages`.
        Comporta una query COUNT(*) addizionale: sconsigliato su risorse grandi.
      schema:
        type: boolean
        default: false

    Cursor:
      name: cursor
      in: query
      required: false
      description: |
        Cursore opaque (base64) ricevuto in `nextCursor` di una precedente
        risposta. Attiva la modalita' di paginazione cursor (keyset) con
        ordinamento fisso `(dataOraUltimoAggiornamento DESC, id DESC)`.

        Mutuamente esclusivo con `page` esplicito, `sort` esplicito e
        `total=true`. Cursor malformato → 400.
      schema:
        type: string

    IdPendenza:
      name: idPendenza
      in: query
      required: false
      description: Match parziale sull'identificativo pendenza.
      schema:
        type: string

    NumeroAvviso:
      name: numeroAvviso
      in: query
      required: false
      description: Numero avviso pagoPA (18 cifre), match esatto.
      schema:
        type: string
        pattern: '^[0-9]{18}$'

    IdDominio:
      name: idDominio
      in: query
      required: false
      description: Codice dominio (11 caratteri), match esatto.
      schema:
        type: string
        pattern: '^[0-9]{11}$'

    IdentificativoDebitore:
      name: identificativoDebitore
      in: query
      required: false
      description: |
        CF/PIVA del soggetto pagatore, match esatto. La presenza di questo
        filtro determina la scrittura di una riga di audit GDPR
        (`PENDENZE_RICERCA_PER_DEBITORE`) in `gp_audit`.
      schema:
        type: string

    IdIntermediarioPath:
      name: idIntermediario
      in: path
      required: true
      description: Codice identificativo dell'intermediario.
      schema:
        type: string
        pattern: '^[a-zA-Z0-9\-_]{1,35}$'

    IfMatch:
      name: If-Match
      in: header
      required: true
      description: |
        `ETag` della rappresentazione su cui si intende operare, ottenuto da una
        GET precedente. Abilita la concorrenza ottimistica: se non corrisponde
        all'`ETag` corrente la richiesta fallisce con 412.
      schema:
        type: string

    CodIntermediario:
      name: codIntermediario
      in: query
      required: false
      description: Match parziale sul codice intermediario.
      schema:
        type: string

    IdStazionePath:
      name: idStazione
      in: path
      required: true
      description: Codice identificativo della stazione.
      schema:
        type: string
        pattern: '^[a-zA-Z0-9\-_]{1,35}$'

    CodStazione:
      name: codStazione
      in: query
      required: false
      description: Match parziale sul codice stazione.
      schema:
        type: string

    Denominazione:
      name: denominazione
      in: query
      required: false
      description: Match parziale sulla denominazione.
      schema:
        type: string

    Abilitato:
      name: abilitato
      in: query
      required: false
      description: Match esatto sullo stato di abilitazione.
      schema:
        type: boolean

