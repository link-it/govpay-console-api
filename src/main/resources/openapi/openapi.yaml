        indirizzo:
          type: string
          maxLength: 70
        civico:
          type: string
          maxLength: 16
        cap:
          type: string
          maxLength: 16
        localita:
          type: string
          maxLength: 35
        provincia:
          type: string
          maxLength: 35
        nazione:
          type: string
          maxLength: 2
          pattern: '^[A-Z]{2}$'
        email:
          type: string
          maxLength: 255
        pec:
          type: string
          maxLength: 255
        tel:
          type: string
          maxLength: 255
        fax:
          type: string
          maxLength: 255
        web:
          type: string
          maxLength: 255
        area:
          type: string
          maxLength: 255
        cbill:
          type: string
          maxLength: 5
          pattern: '^[0-9A-Z]{5}$'
        iuvPrefix:
          type: string
          maxLength: 255
          pattern: '(\d*(%\([yYa{t|p}u]\))?)+'
        autStampaPosteItaliane:
          type: string
          maxLength: 255
        auxDigit:
          type: integer
          format: int32
          minimum: 0
          maximum: 3
        segregationCode:
          type: integer
          format: int32
          minimum: 0
          maximum: 49
        tassonomiaPagoPA:
          type: string
          maxLength: 35
        intermediato:
          type: boolean
          default: true
        scaricaFr:
          type: boolean
        abilitato:
          type: boolean

    DominioReplace:
      type: object
      description: |
        Body per la sostituzione completa di un dominio (`idDominio` dal path).
        `gln` e `idStazione` sono obbligatori solo per i domini intermediati
        (`intermediato` true o assente) e devono essere assenti se `intermediato`
        e' false: il vincolo e' applicato lato server (422).
      required:
        - ragioneSociale
        - abilitato
        - scaricaFr
      properties:
        ragioneSociale:
          type: string
          maxLength: 70
        gln:
          type: string
          maxLength: 35
          pattern: '^[0-9]{13}$'
        idStazione:
          type: string
          maxLength: 35
        indirizzo:
          type: string
          maxLength: 70
        civico:
          type: string
          maxLength: 16
        cap:
          type: string
          maxLength: 16
        localita:
          type: string
          maxLength: 35
        provincia:
          type: string
          maxLength: 35
        nazione:
          type: string
          maxLength: 2
          pattern: '^[A-Z]{2}$'
        email:
          type: string
          maxLength: 255
        pec:
          type: string
          maxLength: 255
        tel:
          type: string
          maxLength: 255
        fax:
          type: string
          maxLength: 255
        web:
          type: string
          maxLength: 255
        area:
          type: string
          maxLength: 255
        cbill:
          type: string
          maxLength: 5
          pattern: '^[0-9A-Z]{5}$'
        iuvPrefix:
          type: string
          maxLength: 255
          pattern: '(\d*(%\([yYa{t|p}u]\))?)+'
        autStampaPosteItaliane:
          type: string
          maxLength: 255
        auxDigit:
          type: integer
          format: int32
          minimum: 0
          maximum: 3
        segregationCode:
          type: integer
          format: int32
          minimum: 0
          maximum: 49
        tassonomiaPagoPA:
          type: string
          maxLength: 35
        intermediato:
          type: boolean
        scaricaFr:
          type: boolean
        abilitato:
          type: boolean

    VersioneStazione:
      type: string
      description: Versione del protocollo pagoPA della stazione.
      enum:
        - V1
        - V2

    StazioneSummary:
      type: object
      description: Proiezione leggera della stazione, usata nelle liste paginate.
      required:
        - idStazione
        - versione
        - abilitato
      properties:
        idStazione:
          type: string
          description: Codice identificativo della stazione (`{idIntermediario}_{applicationCode}`).
          pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        versione:
          $ref: '#/components/schemas/VersioneStazione'
        abilitato:
          type: boolean

    Stazione:
      type: object
      description: Dettaglio canonico di una stazione.
      required:
        - idStazione
        - versione
        - abilitato
        - domini
      properties:
        idStazione:
          type: string
          description: Codice identificativo della stazione (`{idIntermediario}_{applicationCode}`).
          pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        versione:
          $ref: '#/components/schemas/VersioneStazione'
        abilitato:
          type: boolean
        domini:
          type: array
          description: Domini associati alla stazione (sola lettura).
          items:
            $ref: '#/components/schemas/DominioRef'

    StazioneCreate:
      type: object
      description: Body per la creazione di una stazione.
      required:
        - idStazione
        - versione
        - abilitato
      properties:
        idStazione:
          type: string
          description: |
            Codice identificativo della stazione. Formato
            `{idIntermediario}_{applicationCode}` con `applicationCode` tra 1 e 99.
          pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        versione:
          $ref: '#/components/schemas/VersioneStazione'
        abilitato:
          type: boolean

    StazioneReplace:
      type: object
      description: Body per la sostituzione completa di una stazione (`idStazione` dal path).
      required:
        - versione
        - abilitato
      properties:
        versione:
          $ref: '#/components/schemas/VersioneStazione'
        abilitato:
          type: boolean

    TipoAutenticazioneConnettore:
      type: string
      description: |
        Tipo di autenticazione del connettore verso pagoPA. Determina quali
        campi di `ConnettoreAuth` (e quali credenziali) sono significativi.
      enum:
        - NONE
        - HTTPBASIC
        - SSL
        - HEADER
        - APIKEY
        - OAUTH2

    SslTipo:
      type: string
      description: Modalita' SSL quando `tipoAutenticazione=SSL`.
      enum:
        - CLIENT
        - SERVER

    ConnettoreAuth:
      type: object
      description: |
        Parametri di autenticazione del connettore, **senza credenziali**
        (password, segreti, subscription key sono gestiti dall'endpoint
        `/credenziali`).
      required:
        - tipoAutenticazione
      properties:
        tipoAutenticazione:
          $ref: '#/components/schemas/TipoAutenticazioneConnettore'
        username:
          type: string
          description: Username HTTP Basic (la password e' una credenziale).
        sslTipo:
          $ref: '#/components/schemas/SslTipo'
        ksLocation:
          type: string
        ksType:
          type: string
        tsLocation:
          type: string
        tsType:
          type: string
        sslType:
          type: string
        headerName:
          type: string
          description: Nome dell'header per `tipoAutenticazione=HEADER` (il valore e' una credenziale).
        apiId:
          type: string
          description: ID per `tipoAutenticazione=APIKEY` (la api key e' una credenziale).
        clientId:
          type: string
          description: Client id per `tipoAutenticazione=OAUTH2` (il client secret e' una credenziale).
        scope:
          type: string
        urlTokenEndpoint:
          type: string

    ConnettoreIntermediarioPagopa:
      type: object
      description: Connettore pagoPA (PDD) dell'intermediario. Le credenziali non sono incluse.
      required:
        - abilitato
        - auth
      properties:
        abilitato:
          type: boolean
        urlRPT:
          type: string
        auth:
          $ref: '#/components/schemas/ConnettoreAuth'

    ConnettoreIntermediarioPagopaAca:
      type: object
      description: Connettore pagoPA ACA dell'intermediario. Le credenziali non sono incluse.
      required:
        - abilitato
        - auth
      properties:
        abilitato:
          type: boolean
        url:
          type: string
        abilitaGDE:
          type: boolean
        auth:
          $ref: '#/components/schemas/ConnettoreAuth'

    ConnettoreIntermediarioPagopaGpd:
      type: object
      description: Connettore pagoPA GPD dell'intermediario. Le credenziali non sono incluse.
      required:
        - abilitato
        - auth
      properties:
        abilitato:
          type: boolean
        url:
          type: string
        abilitaGDE:
          type: boolean
        auth:
          $ref: '#/components/schemas/ConnettoreAuth'

    ConnettoreIntermediarioPagopaFr:
      type: object
      description: Connettore pagoPA FR dell'intermediario. Le credenziali non sono incluse.
      required:
        - abilitato
        - auth
      properties:
        abilitato:
          type: boolean
        url:
          type: string
        abilitaGDE:
          type: boolean
        auth:
          $ref: '#/components/schemas/ConnettoreAuth'

    ConnettoreIntermediarioPagopaBackofficeEc:
      type: object
      description: Connettore pagoPA Backoffice EC dell'intermediario. Le credenziali non sono incluse.
      required:
        - abilitato
        - auth
      properties:
        abilitato:
          type: boolean
        url:
          type: string
        abilitaGDE:
          type: boolean
        auth:
          $ref: '#/components/schemas/ConnettoreAuth'

    ConnettoreIntermediarioPagopaRecuperoRt:
      type: object
      description: Connettore pagoPA Recupero RT dell'intermediario. Le credenziali non sono incluse.
      required:
        - abilitato
        - auth
      properties:
        abilitato:
          type: boolean
        url:
          type: string
        abilitaGDE:
          type: boolean
        auth:
          $ref: '#/components/schemas/ConnettoreAuth'

    ConnettoreCredenziali:
      type: object
      description: |
        Credenziali del connettore (write-only). Non vengono mai restituite dalle GET.
        Sono significative solo le credenziali coerenti col `tipoAutenticazione` del connettore.
      properties:
        subscriptionKey:
          type: string
        password:
          type: string
          description: Password HTTP Basic.
        ksPassword:
          type: string
        tsPassword:
          type: string
        ksPKeyPasswd:
          type: string
        headerValue:
          type: string
          description: Valore dell'header per `tipoAutenticazione=HEADER`.
        apiKey:
          type: string
          description: Api key per `tipoAutenticazione=APIKEY`.
        clientSecret:
          type: string
          description: Client secret per `tipoAutenticazione=OAUTH2`.

    JsonPatchOperation:
      type: object
      description: Singola operazione JSON Patch (RFC 6902).
      required:
        - op
        - path
      properties:
        op:
          type: string
          enum:
            - add
            - remove
            - replace
            - move
            - copy
            - test
        path:
          type: string
          description: JSON Pointer (RFC 6901) del campo destinazione.
        value:
          description: Valore dell'operazione (per `add`, `replace`, `test`).
        from:
          type: string
          description: JSON Pointer sorgente (per `move`, `copy`).

    JsonPatch:
      type: array
      description: Documento JSON Patch (RFC 6902), sequenza ordinata di operazioni.
      items:
        $ref: '#/components/schemas/JsonPatchOperation'

  responses:

    Problem400:
      description: Richiesta non valida.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Problem401:
      description: Autenticazione mancante o non valida.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Problem404:
      description: Risorsa non trovata.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Problem412:
      description: '`If-Match` non corrisponde all''`ETag` corrente.'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Problem428:
      description: Header `If-Match` mancante.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Problem409:
      description: Conflitto con lo stato corrente della risorsa.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Problem422:
      description: Entita' non processabile (riferimento non risolvibile o vincolo semantico violato).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Problem413:
      description: Payload troppo grande.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Problem415:
      description: Tipo di contenuto non supportato.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

  parameters:

    Page:
      name: page
      in: query
      required: false
      description: Numero della pagina richiesta (1-based).
      schema:
        type: integer
        format: int32
        minimum: 1
        default: 1

    Limit:
      name: limit
      in: query
      required: false
      description: Numero massimo di risultati per pagina.
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 200
        default: 25

    Sort:
      name: sort
      in: query
      required: false
      description: |
        Ordinamento dei risultati. Formato `campo:asc|desc`, separati da virgola
        per ordinamenti multipli. I campi ammessi sono documentati per ogni risorsa.
      schema:
        type: string

    Total:
      name: total
      in: query
      required: false
      description: |
        Se true, la risposta include `totalResults` e `totalPages`.
        Comporta una query COUNT(*) addizionale: sconsigliato su risorse grandi.
      schema:
        type: boolean
        default: false

    Cursor:
      name: cursor
      in: query
      required: false
      description: |
        Cursore opaque (base64) ricevuto in `nextCursor` di una precedente
        risposta. Attiva la modalita' di paginazione cursor (keyset). In questa
        modalita' l'ordinamento e' fisso e specifico della risorsa (documentato
        nella singola operazione).

        Mutuamente esclusivo con `page` esplicito, `sort` esplicito e
        `total=true`. Cursor malformato → 400.
      schema:
        type: string

    IdPendenza:
      name: idPendenza
      in: query
      required: false
      description: Match parziale sull'identificativo pendenza.
      schema:
        type: string

    NumeroAvviso:
      name: numeroAvviso
      in: query
      required: false
      description: Numero avviso pagoPA (18 cifre), match esatto.
      schema:
        type: string
        pattern: '^[0-9]{18}$'

    IdDominio:
      name: idDominio
      in: query
      required: false
      description: Codice dominio (11 caratteri), match esatto.
      schema:
        type: string
        pattern: '^[0-9]{11}$'

    IdentificativoDebitore:
      name: identificativoDebitore
      in: query
      required: false
      description: |
        CF/PIVA del soggetto pagatore, match esatto. La presenza di questo
        filtro determina la scrittura di una riga di audit GDPR
        (`PENDENZE_RICERCA_PER_DEBITORE`) in `gp_audit`.
      schema:
        type: string

    IuvFilter:
      name: iuv
      in: query
      required: false
      description: Identificativo Univoco Versamento, match esatto.
      schema:
        type: string

    IdRicevutaFilter:
      name: idRicevuta
      in: query
      required: false
      description: |
        Identificativo della specifica ricevuta (era `ccp` in V1), match esatto.
        Utile per il lookup diretto a una RT senza passare per il path di dettaglio.
      schema:
        type: string

    DataDa:
      name: dataDa
      in: query
      required: false
      description: Limite inferiore (incluso) sulla data di pagamento (ISO 8601 date).
      schema:
        type: string
        format: date

    DataA:
      name: dataA
      in: query
      required: false
      description: Limite superiore (incluso) sulla data di pagamento (ISO 8601 date).
      schema:
        type: string
        format: date

    IdDominioPath:
      name: idDominio
      in: path
      required: true
      description: Codice fiscale dell'ente creditore (11 cifre).
      schema:
        type: string
        pattern: '^[0-9]{11}$'

    IuvPath:
      name: iuv
      in: path
      required: true
      description: Identificativo Univoco Versamento.
      schema:
        type: string

    IdRicevutaPath:
      name: idRicevuta
      in: path
      required: true
      description: Identificativo della ricevuta.
      schema:
        type: string

    IdIntermediarioPath:
      name: idIntermediario
      in: path
      required: true
      description: Codice identificativo dell'intermediario.
      schema:
        type: string
        pattern: '^[a-zA-Z0-9\-_]{1,35}$'

    IfMatch:
      name: If-Match
      in: header
      required: true
      description: |
        `ETag` della rappresentazione su cui si intende operare, ottenuto da una
        GET precedente. Abilita la concorrenza ottimistica: se non corrisponde
        all'`ETag` corrente la richiesta fallisce con 412.
      schema:
        type: string

    CodIntermediario:
      name: codIntermediario
      in: query
      required: false
      description: Match parziale sul codice intermediario.
      schema:
        type: string

    IdEntrataPath:
      name: idEntrata
      in: path
      required: true
      description: Codice identificativo della tipologia di entrata.
      schema:
        type: string
        maxLength: 255

    IdEntrataFilter:
      name: idEntrata
      in: query
      required: false
      description: Match parziale sul codice entrata.
      schema:
        type: string

    Descrizione:
      name: descrizione
      in: query
      required: false
      description: Match parziale sulla descrizione.
      schema:
        type: string

    IdTipoPendenzaPath:
      name: idTipoPendenza
      in: path
      required: true
      description: Codice identificativo della tipologia di pendenza.
      schema:
        type: string
        maxLength: 35

    IdTipoPendenzaFilter:
      name: idTipoPendenza
      in: query
      required: false
      description: Match parziale sul codice della tipologia di pendenza.
      schema:
        type: string

    IdDominioFilter:
      name: idDominio
      in: query
      required: false
      description: Match parziale sul codice del dominio.
      schema:
        type: string

    RagioneSociale:
      name: ragioneSociale
      in: query
      required: false
      description: Match parziale sulla ragione sociale.
      schema:
        type: string

    IdStazionePath:
      name: idStazione
      in: path
      required: true
      description: Codice identificativo della stazione.
      schema:
        type: string
        pattern: '^[a-zA-Z0-9\-_]{1,35}$'

    CodStazione:
      name: codStazione
      in: query
      required: false
      description: Match parziale sul codice stazione.
      schema:
        type: string

    Denominazione:
      name: denominazione
      in: query
      required: false
      description: Match parziale sulla denominazione.
      schema:
        type: string

    Abilitato:
      name: abilitato
      in: query
      required: false
      description: Match esatto sullo stato di abilitazione.
      schema:
        type: boolean

