          maxLength: 70
        gln:
          type: string
          maxLength: 35
          pattern: '^[0-9]{13}$'
        indirizzo:
          type: string
          maxLength: 70
        civico:
          type: string
          maxLength: 16
        cap:
          type: string
          maxLength: 16
        localita:
          type: string
          maxLength: 35
        provincia:
          type: string
          maxLength: 35
        nazione:
          type: string
          maxLength: 2
          pattern: '^[A-Z]{2}$'
