              schema:
                $ref: '#/components/schemas/Problem'

  /pendenze/{idA2A}/{idPendenza}/ricevute:
    get:
      tags:
        - Pendenze
      operationId: listPendenzaRicevute
      summary: Elenca le ricevute telematiche associate a una pendenza.
      description: |
        Ritorna la lista (metadata-only) delle Ricevute Telematiche (RT) associate
        alla pendenza identificata da `(idA2A, idPendenza)`, ordinate per
        `dataPagamento DESC` (RT piu' recenti prima). Una pendenza puo' avere piu'
        RT (pagamenti parziali, retry, attestazioni out-of-band).

        Nessuna paginazione: il numero di RT per pendenza e' limitato. Nessuna
        content negotiation: questo endpoint ritorna solo `application/json`. Per
        scaricare una RT in XML o PDF il client naviga ai sub-resource dedicati
        delle ricevute partendo dai metadati ottenuti qui.

        ACL: se l'operatore non ha visibilita' sul dominio della pendenza, viene
        restituito 404 (no leak di esistenza). Se la pendenza esiste ma non ha
        ricevute (es. non ancora pagata), viene restituito 200 con lista vuota.
      parameters:
        - name: idA2A
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        - name: idPendenza
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9\-_]{1,35}$'
      responses:
        '200':
          description: Lista delle ricevute della pendenza (eventualmente vuota).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RicevutaSummary'
        '401':
          description: Autenticazione mancante o non valida.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: Pendenza non trovata o non visibile per l'operatore corrente.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /intermediari:
    get:
      tags:
        - Intermediari
      operationId: listIntermediari
      summary: Elenca gli intermediari pagoPA (paginati).
      description: |
        Filtri opzionali e ortogonali (AND):
        - `codIntermediario` — match parziale;
        - `denominazione` — match parziale;
        - `abilitato` — match esatto.

        **Paginazione** (offset): `?page=N&limit=L`. Di default la risposta
        valorizza `pagination` con `hasNextPage` (modalita' Slice, senza COUNT).
        Con `?total=true` vengono aggiunti `totalResults` e `totalPages`
        (modalita' Page, con COUNT addizionale).

        Ordinamento via `?sort=campo` (prefisso `-` per DESC, `+` o nessun
        prefisso per ASC), campi multipli separati da virgola; campi ammessi:
        `codIntermediario`, `denominazione`. Default `codIntermediario` (ASC).
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Total'
        - $ref: '#/components/parameters/CodIntermediario'
        - $ref: '#/components/parameters/Denominazione'
        - $ref: '#/components/parameters/Abilitato'
      responses:
        '200':
          description: Lista paginata di intermediari.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      results:
                        type: array
                        items:
                          $ref: '#/components/schemas/IntermediarioSummary'
        '400':
          description: Parametro di paginazione, ordinamento o filtro non valido.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Autenticazione mancante o non valida.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
    post:
      tags:
        - Intermediari
      operationId: createIntermediario
      summary: Crea un nuovo intermediario.
      description: |
        Crea l'intermediario identificato da `idIntermediario`. Il riferimento al
        connettore pagoPA (PDD) coincide con l'`idIntermediario` ed e' impostato
        automaticamente; la gestione dei connettori e' demandata alla sub-resource
        dedicata.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntermediarioCreate'
      responses:
        '201':
          description: Intermediario creato.
          headers:
            Location:
              description: URI del nuovo intermediario.
              schema:
                type: string
            ETag:
              description: Validatore di concorrenza della rappresentazione creata.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Intermediario'
        '400':
          description: Body non valido.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Autenticazione mancante o non valida.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '409':
          description: Esiste gia' un intermediario con lo stesso `idIntermediario`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

