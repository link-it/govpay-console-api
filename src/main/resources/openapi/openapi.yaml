            schema:
              $ref: '#/components/schemas/ConnettoreIntermediarioPagopaBackofficeEc'
      responses:
        '200':
          description: Connettore aggiornato.
          headers:
            ETag:
              description: Nuovo validatore di concorrenza.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnettoreIntermediarioPagopaBackofficeEc'
        '400':
          $ref: '#/components/responses/Problem400'
        '401':
          $ref: '#/components/responses/Problem401'
        '404':
          $ref: '#/components/responses/Problem404'
        '412':
          $ref: '#/components/responses/Problem412'
        '428':
          $ref: '#/components/responses/Problem428'
  /intermediari/{idIntermediario}/connettori/pagopa-backoffice-ec/credenziali:
    parameters:
      - $ref: '#/components/parameters/IdIntermediarioPath'
    put:
      tags:
        - Connettori
      operationId: putCredenzialiConnettorePagopaBackofficeEc
      summary: Imposta le credenziali del connettore pagoPA Backoffice EC (write-only).
      description: |
        Aggiorna le credenziali del connettore. Non vengono mai restituite dalle GET.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnettoreCredenziali'
      responses:
        '204':
          description: Credenziali aggiornate.
        '400':
          $ref: '#/components/responses/Problem400'
        '401':
          $ref: '#/components/responses/Problem401'
        '404':
          $ref: '#/components/responses/Problem404'

  /intermediari/{idIntermediario}/connettori/pagopa-recupero-rt:
