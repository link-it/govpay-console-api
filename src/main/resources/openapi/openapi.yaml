        messaggio:
          type: object
        allegaPdf:
          type: boolean
          description: Indica se allegare alla mail il PDF dell'avviso.

    TipoPendenzaPromemoriaRicevutaMail:
      type: object
      description: Configurazione del promemoria ricevuta di pagamento via mail.
      required:
