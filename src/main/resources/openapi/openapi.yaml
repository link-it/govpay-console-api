      properties:
        idIntermediario:
          type: string
          description: Codice identificativo dell'intermediario.
          pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        denominazione:
          type: string
          description: Ragione sociale dell'intermediario pagoPA.
          maxLength: 255
        principalPagoPa:
          type: string
          description: Principal con cui sono autenticate le richieste ricevute da pagoPA.
          maxLength: 4000
        abilitato:
          type: boolean

    IntermediarioCreate:
      type: object
      description: Body per la creazione di un intermediario.
      required:
        - idIntermediario
        - denominazione
        - principalPagoPa
        - abilitato
      properties:
        idIntermediario:
          type: string
          description: Codice identificativo dell'intermediario.
          pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        denominazione:
          type: string
          maxLength: 255
        principalPagoPa:
          type: string
          maxLength: 4000
        abilitato:
          type: boolean

    IntermediarioReplace:
      type: object
      description: Body per la sostituzione completa di un intermediario (`idIntermediario` dal path).
      required:
