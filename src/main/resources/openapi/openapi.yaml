          pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        denominazione:
          type: string
          maxLength: 255
        abilitato:
          type: boolean

    Intermediario:
      type: object
      description: Dettaglio canonico di un intermediario pagoPA.
      required:
