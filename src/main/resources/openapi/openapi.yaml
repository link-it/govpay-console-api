        trasformazione:
          $ref: '#/components/schemas/TipoPendenzaTrasformazione'
        inoltro:
          type: string
          description: Identificativo dell'applicazione verso cui inoltrare la pendenza.
          maxLength: 35

    TipoPendenzaPortalePagamento:
      type: object
      description: Configurazione del caricamento pendenze dal portale di pagamento.
      required:
