openapi: 3.0.3
info:
  title: GovPay Console API
  version: 2.0.0-SNAPSHOT
  description: |
    API consumata dalla web-console GovPay per le funzionalita' di backoffice
    (configurazione, impostazioni, manutenzione, consultazione).
  contact:
    name: GitHub Project Page
    url: 'https://github.com/link-it/govpay-console-api/'
  license:
    name: GPL
    url: 'https://github.com/link-it/govpay-console-api/blob/master/LICENSE'

servers:
  - url: /govpay/console-api

tags:
  - name: Pendenze
    description: Pagamenti in attesa e spontanei.
  - name: Profilo
    description: Profilo dell'utenza autenticata corrente.
  - name: Autenticazione
    description: Endpoint di login, logout e discovery dei metodi di autenticazione.

paths:

  /profilo:
    get:
      tags:
        - Profilo
      operationId: getProfilo
      summary: Profilo dell'utenza autenticata corrente.
      description: |
        Ritorna nome, principal, metodo di autenticazione applicato, domini
        e tipi pendenza su cui l'utenza opera, ruoli e ACL piatte.

        Issue link-it/govpay-console-api#10 scope B. Cache-Control:
        `private, max-age=60` (dato personale, niente caching condiviso).
      responses:
        '200':
          description: Profilo dell'utenza autenticata.
          headers:
            Cache-Control:
              description: 'private, max-age=60'
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profilo'
        '401':
          description: Autenticazione mancante o non valida.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /auth/login:
    post:
      tags:
        - Autenticazione
      operationId: login
      summary: Login con credenziali username/password.
      description: |
        Autentica l'utenza tramite credenziali in body JSON e crea una
        sessione lato server. La response porta il `Profilo` dell'utenza
        appena autenticata (evita un secondo round-trip a `GET /profilo`)
        e setta i cookie `JSESSIONID` (sessione) e `XSRF-TOKEN` (CSRF).

        Issue link-it/govpay-console-api#10 scope C. Limitazione anti
        brute-force: rate-limit per IP del chiamante.

        Audit `gp_audit`:
        - Successo → `PROFILO_LOGIN` con `dettaglio.metodo = FORM`.
        - Fallimento (per principal noto) → `PROFILO_LOGIN_FAILED` con
          `dettaglio.motivo` ∈ {BAD_CREDENTIALS, DISABLED, RATE_LIMITED}.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RichiestaLogin'
      responses:
        '200':
          description: |
            Login riuscito. Cookie di sessione (`JSESSIONID`) e CSRF
            (`XSRF-TOKEN`) impostati. Body con il profilo utente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profilo'
        '400':
          description: Body JSON malformato o campi obbligatori mancanti.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Credenziali non valide o utenza disabilitata.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '429':
          description: |
            Troppi tentativi di login dallo stesso IP. Riprovare piu' tardi.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /auth/methods:
    get:
      tags:
        - Autenticazione
      operationId: getAuthMethods
      summary: Metodi di autenticazione attivi sul server.
      description: |
        Discovery dei metodi di autenticazione abilitati lato server, cosi'
        il frontend puo' renderizzare i pulsanti di login senza hard-coding.

        **Endpoint pubblico** (no auth). `Cache-Control: public, max-age=300`
        perche' la risposta dipende solo dalla configurazione lato server e
        un short TTL evita round-trip ridondanti.

        Issue link-it/govpay-console-api#10 scope E.
      responses:
        '200':
          description: Lista dei metodi attivi.
          headers:
            Cache-Control:
              description: 'public, max-age=300'
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetodiAutenticazione'

  /auth/logout:
    post:
      tags:
        - Autenticazione
      operationId: logout
      summary: Logout esplicito (invalidazione sessione).
      description: |
        Invalida la sessione lato server e cancella i cookie `JSESSIONID`
        e `XSRF-TOKEN`. Richiede header CSRF (`X-XSRF-TOKEN`) coerente con
        il cookie quando la richiesta porta una sessione attiva e nessun
        header `Authorization` (CSRF condizionale).

        **Semantica idempotente**: ritorna `204` anche quando non c'e' una
        sessione da invalidare (es. retry dopo timeout client, doppio click
        sul pulsante di logout). L'audit `PROFILO_LOGOUT` viene scritto
        solo se il principal era effettivamente autenticato; altrimenti
        l'operazione e' un no-op silenzioso.

        Issue link-it/govpay-console-api#10 scope D. Audit `gp_audit`:
        `PROFILO_LOGOUT` con `dettaglio.motivo = USER_REQUEST` (principal
        catturato pre-clear del context).
      responses:
        '204':
          description: |
            Logout effettuato (o no-op idempotente se non c'era sessione).
        '403':
          description: |
            Token CSRF mancante o non coerente. Si verifica solo se la
            richiesta porta una sessione attiva e nessun header
            `Authorization` (CSRF e' condizionale).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /pendenze:
    get:
      tags:
        - Pendenze
      operationId: listPendenze
      summary: Elenca le pendenze visibili all'operatore autenticato (paginate).
      description: |
        Filtri supportati in Fase 1 (Issue #9):
        - `idPendenza` — partial match;
        - `numeroAvviso` — match esatto, 18 cifre;
        - `idDominio` — match esatto, 11 caratteri;
        - `identificativoDebitore` — match esatto.

        Tutti i filtri sono opzionali e ortogonali (AND). I filtri V1 non
        ancora supportati (`idA2A`, `iuv`, `stato`, `tipoPendenza`, `dataDa`,
        `dataA`, `direzione`, `divisione`, `idDebitore`, `mostraSpontaneiNonPagati`)
        ritornano 400 problem+json.

        ACL: il filtro per dominio dell'operatore corrente viene applicato
        silenziosamente; un operatore senza visibilita' su alcun dominio riceve
        una lista vuota (mai 403).

        Quando `identificativoDebitore` e' valorizzato la richiesta viene
        registrata in `gp_audit` (azione `PENDENZE_RICERCA_PER_DEBITORE`).

        **Paginazione**: due modalita' mutuamente esclusive.
        - **offset** (default): `?page=N&limit=L`; risposta con `pagination` valorizzato.
        - **cursor** (opt-in): `?cursor=<opaco>`; risposta con `nextCursor`,
          ordinamento fisso `(dataOraUltimoAggiornamento DESC, id DESC)`.
        In modalita' cursor `page` esplicito, `sort` esplicito o `total=true`
        generano 400 problem+json con motivazione parlante. Cursor malformato
        → 400.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Total'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/IdPendenza'
        - $ref: '#/components/parameters/NumeroAvviso'
        - $ref: '#/components/parameters/IdDominio'
        - $ref: '#/components/parameters/IdentificativoDebitore'
      responses:
        '200':
          description: Lista paginata di pendenze.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      results:
                        type: array
                        items:
                          $ref: '#/components/schemas/PendenzaSummary'
        '400':
          description: Filtro non supportato, parametro malformato o `limit > 200`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Autenticazione mancante o non valida.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /pendenze/{idA2A}/{idPendenza}:
    get:
      tags:
        - Pendenze
      operationId: getPendenza
      summary: Dettaglio di una pendenza, comprensivo di voci embedded e _links condizionali.
      description: |
        Restituisce la pendenza identificata da `(idA2A, idPendenza)`. Le `voci`
        sono sempre embedded inline (max 5).

        `_links`:
        - `informazioniDebitore` sempre presente;
        - `avviso` presente solo se `numeroAvviso != null`;
        - `ricevuta` presente solo se la pendenza ha almeno un pagamento riuscito
          (stato in `PAGATA | PAGATA_PARZIALE | RICONCILIATA`).

        `?expand=datiAllegati,proprieta` consente di includere sotto-tree
        opt-in nel body. Valori sconosciuti causano 400.

        ACL: se l'operatore non ha visibilita' sul dominio della pendenza,
        viene restituito 404 (no leak di esistenza, mai 403).
      parameters:
        - name: idA2A
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        - name: idPendenza
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        - name: expand
          in: query
          required: false
          description: Sotto-tree opt-in (CSV) da espandere nel body.
          style: form
          explode: false
          schema:
            type: array
            uniqueItems: true
            items:
              $ref: '#/components/schemas/PendenzaExpand'
      responses:
        '200':
          description: Dettaglio pendenza.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pendenza'
        '400':
          description: Parametri non validi (es. valori di `expand` sconosciuti).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Autenticazione mancante o non valida.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: Pendenza non trovata o non visibile per l'operatore corrente.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /pendenze/{idA2A}/{idPendenza}/avviso:
    get:
      tags:
        - Pendenze
      operationId: getPendenzaAvviso
      summary: Avviso di pagamento associato a una pendenza.
      description: |
        Ritorna l'avviso di pagamento associato alla pendenza identificata da
        `(idA2A, idPendenza)`. Il backend deriva `(idDominio, numeroAvviso)` dalla
        pendenza, evitando al client il lookup esplicito.

        Content negotiation tramite header `Accept`:
        - `application/json` (default) → metadati locali dell'avviso (`Avviso`);
        - `application/pdf` → stampa binaria generata dal microservizio
          `govpay-stampe`. Endpoint allineato a V1 `/avvisi/{idDominio}/{numeroAvviso}`:
          genera il PDF dell'avviso della singola pendenza anche quando
          appartiene a un documento multi-rata. Il PDF aggregato dell'intero
          documento e' una feature distinta, oggetto di issue dedicata.

        ACL: se l'operatore non ha visibilita' sul dominio della pendenza,
        viene restituito 404 (no leak di esistenza). Se la pendenza non ha
        `numeroAvviso` (es. pendenza spontanea non ancora avvisata) viene
        restituito 404.
      parameters:
        - name: idA2A
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        - name: idPendenza
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        - name: linguaSecondaria
          in: query
          required: false
          description: |
            Lingua secondaria per la stampa bilingue dell'avviso. Significativa
            solo in `application/pdf`. Vedi schema `LinguaSecondaria`.
          schema:
            $ref: '#/components/schemas/LinguaSecondaria'
      responses:
        '200':
          description: Avviso (formato dipende dall'header `Accept`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Avviso'
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          description: Autenticazione mancante o non valida.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: |
            Pendenza non trovata, non visibile per l'operatore corrente, oppure
            priva di `numeroAvviso`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '406':
          description: |
            Header `Accept` non compatibile con `application/json` o `application/pdf`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          description: |
            Avviso PDF non applicabile a questa pendenza (Marca da Bollo Telematica).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '502':
          description: Errore di comunicazione con il microservizio `govpay-stampe`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '503':
          description: Microservizio `govpay-stampe` non configurato (`app.stampe.base-url` mancante).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /pendenze/{idA2A}/{idPendenza}/informazioniDebitore:
    get:
      tags:
        - Pendenze
      operationId: getInformazioniDebitore
      summary: Dati anagrafici e contatti del debitore associato alla pendenza.
      description: |
        Ritorna l'oggetto `Soggetto` completo (dati anagrafici e contatti del
        soggetto pagatore). Endpoint separato dal dettaglio pendenza per
        minimizzare l'esposizione di dati personali (scope F della issue #9).

        ACL: se l'operatore non ha visibilita' sul dominio della pendenza,
        viene restituito 404 (no leak di esistenza).

        **Audit GDPR**: ogni 200 scrive una riga in `gp_audit` con azione
        `PENDENZA_VISUALIZZA_DEBITORE`, dettaglio JSON
        `{idA2A, idPendenza, identificativoDebitore}` e IP del richiedente
        (dal primo elemento di `X-Forwarded-For` se presente, altrimenti
        `request.getRemoteAddr()`).
      parameters:
        - name: idA2A
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        - name: idPendenza
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9\-_]{1,35}$'
      responses:
        '200':
          description: Soggetto pagatore.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Soggetto'
        '401':
          description: Autenticazione mancante o non valida.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: Pendenza non trovata o non visibile per l'operatore corrente.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /pendenze/{idA2A}/{idPendenza}/ricevuta:
    get:
      tags:
        - Pendenze
      operationId: getPendenzaRicevuta
      summary: Ricevuta Telematica associata a una pendenza.
      description: |
        Ritorna la Ricevuta Telematica (RT) associata alla pendenza identificata
        da `(idA2A, idPendenza)`. Strategia **"RT principale"**: l'ultima RT
        riuscita ordinata per `dataPagamento DESC`, dove "riuscita" significa
        `cod_esito_pagamento ∈ {0, 2}` (Eseguito o Parzialmente eseguito) —
        coerente con scope C, dove `_links.ricevuta` appare solo per stati
        `PAGATA | PAGATA_PARZIALE | RICONCILIATA`.

        Content negotiation tramite header `Accept`:
        - `application/json` (default) → metadati locali della RT (`Ricevuta`);
        - `application/xml` → **RT originale dal DB** (`xml_rt` byte-identico
          al ricevuto da PagoPA), streaming;
        - `application/pdf` → stampa binaria generata dal microservizio
          `govpay-stampe` (endpoint `/receipt`), streaming.

        ACL: se l'operatore non ha visibilita' sul dominio della pendenza,
        viene restituito 404 (no leak di esistenza). Se la pendenza non ha
        nessuna RT principale (es. pendenza non ancora pagata) viene
        restituito 404.
      parameters:
        - name: idA2A
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        - name: idPendenza
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9\-_]{1,35}$'
      responses:
        '200':
          description: Ricevuta (formato dipende dall'header `Accept`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ricevuta'
            application/xml:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          description: Autenticazione mancante o non valida.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: |
            Pendenza non trovata, non visibile per l'operatore corrente, oppure
            priva di RT principale (es. pendenza non pagata).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '406':
          description: |
            Header `Accept` non compatibile con `application/json`, `application/xml`
            o `application/pdf`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '502':
          description: Errore di comunicazione con il microservizio `govpay-stampe`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '503':
          description: Microservizio `govpay-stampe` non configurato (`app.stampe.base-url` mancante).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

components:
  schemas:

    Problem:
      type: object
      description: RFC 7807 problem details
      required:
        - status
      properties:
        type:
          type: string
          format: uri
          default: about:blank
        title:
          type: string
        status:
          type: integer
          minimum: 100
          maximum: 599
        detail:
          type: string
        instance:
          type: string
          format: uri
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

    Pagination:
      type: object
      description: Metadati di paginazione associati a una risposta paginata.
      required:
        - page
        - limit
        - hasNextPage
      properties:
        page:
          type: integer
          format: int32
          minimum: 1
          description: Numero della pagina corrente (1-based).
        limit:
          type: integer
          format: int32
          minimum: 1
          maximum: 200
          description: Numero massimo di risultati per pagina.
        hasNextPage:
          type: boolean
          description: True se esiste almeno un risultato oltre la pagina corrente.
        totalResults:
          type: integer
          format: int64
          minimum: 0
          description: Numero totale di risultati. Presente solo se la richiesta ha `total=true`.
        totalPages:
          type: integer
          format: int32
          minimum: 0
          description: Numero totale di pagine. Presente solo se la richiesta ha `total=true`.

    PaginatedResponse:
      type: object
      description: |
        Forma comune di tutte le risposte paginate.
        I consumer specializzano `results` via `allOf` con il proprio item type.
        Due modalita' di paginazione mutuamente esclusive a livello di response:
        - **offset** (default): `pagination` valorizzato (page/limit/hasNextPage + opzionali totalResults/totalPages se richiesto `total=true`);
        - **cursor** (opt-in con `?cursor=`): `nextCursor` valorizzato con il cursore della pagina successiva.
        L'esclusione mutua e' enforced dal controller (`?page` + `?cursor` => 400).
      required:
        - results
      properties:
        results:
          type: array
          items: {}
        pagination:
          $ref: '#/components/schemas/Pagination'
        nextCursor:
          type: string
          description: |
            Cursore opaque base64 da rispedire come `?cursor=` per ottenere la
            pagina successiva. Presente solo in modalita' cursor e se esistono altri risultati.

    DominioRef:
      type: object
      required:
        - idDominio
        - ragioneSociale
      properties:
        idDominio:
          type: string
          description: Codice dominio (es. P.IVA 11 cifre).
          example: "12345678901"
        ragioneSociale:
          type: string

    TipoPendenzaRef:
      type: object
      required:
        - idTipoPendenza
        - descrizione
      properties:
        idTipoPendenza:
          type: string
          example: "TARI"
        descrizione:
          type: string

    UnitaOperativaRef:
      type: object
      required:
        - idUnitaOperativa
        - ragioneSociale
      properties:
        idUnitaOperativa:
          type: string
        ragioneSociale:
          type: string

    TipoPendenza:
      type: string
      enum:
        - DOVUTA
        - SPONTANEA

    StatoPendenza:
      type: string
      description: |
        Stato della pendenza in V2.
        Mapping rispetto agli stati V1:
        - V1 `ESEGUITA` -> V2 `PAGATA`
        - V1 `NON_ESEGUITA` -> V2 `NON_PAGATA`
        - V1 `ESEGUITA_PARZIALE` -> V2 `PAGATA_PARZIALE`
        - V1 `INCASSATA` -> V2 `RICONCILIATA`
        - V1 `ANNULLATA`/`SCADUTA`/`ANOMALA` -> identici in V2.
      enum:
        - NON_PAGATA
        - PAGATA
        - PAGATA_PARZIALE
        - ANNULLATA
        - SCADUTA
        - RICONCILIATA
        - ANOMALA

    StatoVocePendenza:
      type: string
      enum:
        - NON_PAGATA
        - PAGATA
        - ANOMALA

    StatoAvviso:
      type: string
      description: |
        Stato dell'avviso di pagamento. Mapping V1 -> V2:
        - `Pagato` -> `PAGATO`
        - `Non pagato` -> `NON_PAGATO`
        - `Scaduto` -> `SCADUTO`
        - `Annullato` -> `ANNULLATO`
      enum:
        - PAGATO
        - NON_PAGATO
        - SCADUTO
        - ANNULLATO

    LinguaSecondaria:
      type: string
      description: |
        Lingua secondaria per province bilingui.

        Semantica equivalente a V1 (`it.govpay.core.beans.tracciati.LinguaSecondaria`):
        - **`DE`/`EN`/`FR`/`SL`**: forza la stampa bilingue con la lingua indicata,
          sovrascrivendo l'eventuale default impostato sulla pendenza.
        - **`NONE`**: forza la stampa solo in italiano, sovrascrivendo l'eventuale
          default bilingue impostato sulla pendenza. In V1 questo valore era
          denominato `FALSE`; e' stato rinominato in `NONE` in V2 per leggibilita',
          la semantica e' identica.
        - **Parametro assente**: usa il default della pendenza (`proprietaPendenza.linguaSecondaria`).
          Se anche il default e' assente, l'avviso e' in solo italiano.
      enum:
        - DE
        - EN
        - FR
        - SL
        - NONE

    PendenzaExpand:
      type: string
      description: Sotto-tree opt-in espandibile nel dettaglio pendenza via `?expand=`.
      enum:
        - datiAllegati
        - proprieta

    Link:
      type: object
      description: Hyperlink in stile HAL.
      required:
        - href
      properties:
        href:
          type: string
        type:
          type: string

    PendenzaLinks:
      type: object
      description: |
        Collezione di hyperlink relativi alla pendenza. La chiave `informazioniDebitore`
        e' sempre presente; `avviso`/`ricevuta` sono condizionali (vedi descrizione di `Pendenza`).
        Lo schema accetta `additionalProperties` di tipo `Link` per consentire l'aggiunta
        non-breaking di chiavi future (rpp, pagamenti, allegati, ...).
      required:
        - informazioniDebitore
      properties:
        informazioniDebitore:
          $ref: '#/components/schemas/Link'
        avviso:
          $ref: '#/components/schemas/Link'
        ricevuta:
          $ref: '#/components/schemas/Link'
      additionalProperties:
        $ref: '#/components/schemas/Link'

    VocePendenza:
      type: object
      description: Voce di una pendenza (embedded inline in `Pendenza`, max 5 per pendenza).
      required:
        - idVocePendenza
        - indice
        - importo
        - stato
      properties:
        idVocePendenza:
          type: string
        indice:
          type: integer
          format: int32
          minimum: 1
        importo:
          type: number
          format: double
        descrizione:
          type: string
        stato:
          $ref: '#/components/schemas/StatoVocePendenza'
        descrizioneCausaleRPT:
          type: string
        contabilita:
          type: string
        datiAllegati:
          type: string
        metadata:
          type: string

    PendenzaSummary:
      type: object
      description: |
        Proiezione leggera della pendenza, usata nelle liste paginate.
      required:
        - idA2A
        - idPendenza
        - stato
        - tipo
        - anomalo
        - verificato
        - dominio
        - tipoPendenza
        - importo
        - importoPagato
        - dataUltimoAggiornamento
        - idDebitore
      properties:
        idA2A:
          type: string
          pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        idPendenza:
          type: string
          pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        stato:
          $ref: '#/components/schemas/StatoPendenza'
        tipo:
          $ref: '#/components/schemas/TipoPendenza'
        anomalo:
          type: boolean
        verificato:
          type: boolean
        dominio:
          $ref: '#/components/schemas/DominioRef'
        tipoPendenza:
          $ref: '#/components/schemas/TipoPendenzaRef'
        unitaOperativa:
          allOf:
            - $ref: '#/components/schemas/UnitaOperativaRef'
          nullable: true
          description: Null per pendenze non assegnate a una unita' operativa.
        importo:
          type: number
          format: double
        importoPagato:
          type: number
          format: double
        dataScadenza:
          type: string
          format: date-time
        dataUltimoAggiornamento:
          type: string
          format: date-time
        numeroAvviso:
          type: string
          pattern: '^[0-9]{18}$'
        iuvAvviso:
          type: string
        causaleBreve:
          type: string
          maxLength: 80
        idDebitore:
          type: string
          description: Solo CF/PIVA del soggetto pagatore. I dati anagrafici completi sono su `/informazioniDebitore`.

    Pendenza:
      description: |
        Dettaglio canonico di una pendenza. Composizione: `PendenzaSummary` + dati
        propri + `voci` embedded inline (max 5 items, sempre presente) + sub-tree
        opt-in (`datiAllegati`, `proprieta`) + `_links` (con `informazioniDebitore`
        sempre presente).
        `soggettoPagatore` NON e' nel body: per i dati anagrafici/contatti del
        debitore il client chiama `/informazioniDebitore`.
      allOf:
        - $ref: '#/components/schemas/PendenzaSummary'
        - type: object
          required:
            - voci
            - _links
          properties:
            descrizione:
              type: string
            tassonomia:
              type: string
            tassonomiaAvviso:
              type: string
            documento:
              type: string
            direzione:
              type: string
            divisione:
              type: string
            voci:
              type: array
              minItems: 1
              maxItems: 5
              items:
                $ref: '#/components/schemas/VocePendenza'
            datiAllegati:
              type: string
              description: Presente solo se richiesto via `?expand=datiAllegati`.
            proprieta:
              type: string
              description: Presente solo se richiesto via `?expand=proprieta`.
            _links:
              $ref: '#/components/schemas/PendenzaLinks'

    Avviso:
      type: object
      description: |
        Metadati locali dell'avviso di pagamento associato a una pendenza
        (variante `application/json` dell'endpoint `/avviso`).
      required:
        - idDominio
        - numeroAvviso
        - importo
        - stato
      properties:
        idDominio:
          type: string
        numeroAvviso:
          type: string
          pattern: '^[0-9]{18}$'
        importo:
          type: number
          format: double
        descrizione:
          type: string
        dataValidita:
          type: string
          format: date-time
        dataScadenza:
          type: string
          format: date-time
        tassonomiaAvviso:
          type: string
        qrcode:
          type: string
        barcode:
          type: string
        stato:
          $ref: '#/components/schemas/StatoAvviso'

    PspRef:
      type: object
      description: Identificativi minimi del Prestatore di Servizi di Pagamento (PSP).
      required:
        - idPsp
      properties:
        idPsp:
          type: string
        ragioneSociale:
          type: string

    Ricevuta:
      type: object
      description: |
        Metadati locali della Ricevuta Telematica (RT) associata a una pendenza
        (variante `application/json` dell'endpoint `/ricevuta`). Strategia "RT
        principale": l'ultima riuscita ordinata per `dataPagamento DESC`.
      required:
        - iuv
        - ccp
        - idDominio
        - dataPagamento
        - importoTotalePagato
      properties:
        iuv:
          type: string
        ccp:
          type: string
        idDominio:
          type: string
        dataPagamento:
          type: string
          format: date-time
        importoTotalePagato:
          type: number
          format: double
        psp:
          $ref: '#/components/schemas/PspRef'
        riferimentoTransazione:
          type: string
        causale:
          type: string
        singoliVersamenti:
          type: array
          items:
            type: object
            properties:
              iur:
                type: string
              importo:
                type: number
                format: double
              causale:
                type: string

    Soggetto:
      type: object
      description: |
        Anagrafica e contatti del soggetto pagatore (debitore). Esposto solo
        attraverso `/informazioniDebitore` per minimizzare l'esposizione di dati
        personali. Ogni 200 viene tracciato in `gp_audit`.
      required:
        - tipo
        - identificativo
        - anagrafica
      properties:
        tipo:
          type: string
          description: F = persona fisica, G = persona giuridica.
          enum:
            - F
            - G
        identificativo:
          type: string
          description: CF (16 char) o PIVA (11 cifre).
        anagrafica:
          type: string
          description: Nome+cognome (F) o ragione sociale (G).
        indirizzo:
          type: string
        civico:
          type: string
        cap:
          type: string
        localita:
          type: string
        provincia:
          type: string
        nazione:
          type: string
          description: Codice ISO 3166-1 alpha-2.
        email:
          type: string
          format: email
        cellulare:
          type: string

    AutenticazioneEnum:
      type: string
      description: |
        Codice del metodo di autenticazione con cui l'utenza si e' autenticata.
        Valori allineati alla property `authType` delle chain V1 di GovPay
        e all'enum `it.govpay.common.auth.spi.AuthType` della libreria
        `govpay-common-auth`.
      enum:
        - BASIC
        - LDAP
        - FORM
        - SSL
        - SSL_HEADER
        - HEADER
        - API_KEY
        - SPID
        - SESSION
        - OAUTH2
        - PUBLIC
      example: FORM

    RuoloRef:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          description: Identificativo del ruolo (es. nome del role configurato).
          example: AMMINISTRATORE

    Acl:
      type: object
      required:
        - servizio
        - autorizzazioni
      description: |
        Entry ACL appiattita: per ciascun servizio elencato, l'utenza ha la lista
        di autorizzazioni associate. Replica lo schema V1 `aclPost`.
      properties:
        servizio:
          type: string
          description: Servizio oggetto dell'autorizzazione.
          enum:
            - "Anagrafica PagoPA"
            - "Anagrafica Creditore"
            - "Anagrafica Applicazioni"
            - "Anagrafica Ruoli"
            - "Pagamenti"
            - "Pendenze"
            - "Rendicontazioni e Incassi"
            - "Giornale degli Eventi"
            - "Configurazione e manutenzione"
        autorizzazioni:
          type: array
          items:
            type: string
            enum:
              - R
              - W
          example:
            - R
            - W
        ruolo:
          type: string
          description: |
            Identificativo del ruolo che ha originato la entry ACL (opzionale,
            valorizzato solo se l'ACL deriva da un ruolo del catalogo invece
            che da un'ACL diretta sull'utenza).
          example: AMMINISTRATORE

    Profilo:
      type: object
      required:
        - nome
        - autenticazione
      description: |
        Profilo dell'utenza autenticata corrente. Ritornato da `GET /profilo` e
        come body di `POST /auth/login`.

        Domini, tipiPendenza e ruoli espongono singolarmente la collezione di
        risorse su cui l'utenza puo' operare; quando l'utenza ha autorizzazione
        "star" (tutti i domini / tutti i tipi pendenza), la collezione contiene
        un singolo elemento placeholder con id `*` e descrizione `Tutti`
        (compatibilita' V1).
      properties:
        nome:
          type: string
          description: Display name dell'utenza (per OPERATORE = operatori.nome).
          example: Mario Rossi
        principal:
          type: string
          description: Identificativo dell'utenza autenticata (username, CF, subject del cert, ...).
          example: m.rossi
        autenticazione:
          $ref: '#/components/schemas/AutenticazioneEnum'
        domini:
          type: array
          description: Domini su cui l'utenza puo' operare.
          items:
            $ref: '#/components/schemas/DominioRef'
        tipiPendenza:
          type: array
          description: Tipi pendenza su cui l'utenza puo' operare.
          items:
            $ref: '#/components/schemas/TipoPendenzaRef'
        ruoli:
          type: array
          description: Ruoli assegnati all'utenza.
          items:
            $ref: '#/components/schemas/RuoloRef'
        acl:
          type: array
          description: ACL appiattite dell'utenza (servizio + autorizzazioni R/W).
          items:
            $ref: '#/components/schemas/Acl'

    RichiestaLogin:
      type: object
      required:
        - username
        - password
      description: |
        Body di `POST /auth/login`. Sostituisce il flusso V1 (Basic + first
        request) con un endpoint dedicato che accetta credenziali in JSON.
      properties:
        username:
          type: string
          example: m.rossi
        password:
          type: string
          format: password

    MetodoAutenticazione:
      type: object
      required:
        - codice
      description: |
        Metodo di autenticazione esposto dalla console-api, con l'URL da cui
        il client puo' iniziare il flow corrispondente.
      properties:
        codice:
          $ref: '#/components/schemas/AutenticazioneEnum'
        etichetta:
          type: string
          description: Label localizzata per la UI (es. "Username e password", "SPID", "Carta CIE").
          example: Username e password
        urlInizio:
          type: string
          description: |
            URL per iniziare il flow (es. `/auth/login` per FORM, redirect IdP per SPID).
            Puo' essere relativo (URL interno) o assoluto (redirect esterno).
          example: /auth/login
        descrizione:
          type: string
          description: Descrizione opzionale del metodo, per UI di selezione.

    MetodiAutenticazione:
      type: object
      required:
        - metodi
      description: |
        Risposta di `GET /auth/methods`. Endpoint pubblico che permette al
        frontend di renderizzare i pulsanti di login appropriati senza
        hard-coding dei metodi server-side.
      properties:
        metodi:
          type: array
          items:
            $ref: '#/components/schemas/MetodoAutenticazione'

  parameters:

    Page:
      name: page
      in: query
      required: false
      description: Numero della pagina richiesta (1-based).
      schema:
        type: integer
        format: int32
        minimum: 1
        default: 1

    Limit:
      name: limit
      in: query
      required: false
      description: Numero massimo di risultati per pagina.
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 200
        default: 25

    Sort:
      name: sort
      in: query
      required: false
      description: |
        Ordinamento dei risultati. Formato `campo:asc|desc`, separati da virgola
        per ordinamenti multipli. I campi ammessi sono documentati per ogni risorsa.
      schema:
        type: string

    Total:
      name: total
      in: query
      required: false
      description: |
        Se true, la risposta include `totalResults` e `totalPages`.
        Comporta una query COUNT(*) addizionale: sconsigliato su risorse grandi.
      schema:
        type: boolean
        default: false

    Cursor:
      name: cursor
      in: query
      required: false
      description: |
        Cursore opaque (base64) ricevuto in `nextCursor` di una precedente
        risposta. Attiva la modalita' di paginazione cursor (keyset) con
        ordinamento fisso `(dataOraUltimoAggiornamento DESC, id DESC)`.

        Mutuamente esclusivo con `page` esplicito, `sort` esplicito e
        `total=true`. Cursor malformato → 400.
      schema:
        type: string

    IdPendenza:
      name: idPendenza
      in: query
      required: false
      description: Match parziale sull'identificativo pendenza.
      schema:
        type: string

    NumeroAvviso:
      name: numeroAvviso
      in: query
      required: false
      description: Numero avviso pagoPA (18 cifre), match esatto.
      schema:
        type: string
        pattern: '^[0-9]{18}$'

    IdDominio:
      name: idDominio
      in: query
      required: false
      description: Codice dominio (11 caratteri), match esatto.
      schema:
        type: string
        pattern: '^[0-9]{11}$'

    IdentificativoDebitore:
      name: identificativoDebitore
      in: query
      required: false
      description: |
        CF/PIVA del soggetto pagatore, match esatto. La presenza di questo
        filtro determina la scrittura di una riga di audit GDPR
        (`PENDENZE_RICERCA_PER_DEBITORE`) in `gp_audit`.
      schema:
        type: string

