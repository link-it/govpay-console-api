            ETag:
              description: Validatore di concorrenza della rappresentazione corrente.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entrata'
        '401':
          $ref: '#/components/responses/Problem401'
        '404':
          $ref: '#/components/responses/Problem404'
    put:
      tags:
        - Entrate
      operationId: replaceEntrata
      summary: Sostituisce una tipologia di entrata (full update).
      description: |
        Sostituisce integralmente la tipologia di entrata. Richiede l'header
        `If-Match` con l'`ETag` ottenuto da una GET precedente.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntrataReplace'
      responses:
        '200':
          description: Tipologia di entrata aggiornata.
          headers:
            ETag:
              description: Nuovo validatore di concorrenza.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entrata'
        '400':
          $ref: '#/components/responses/Problem400'
        '401':
          $ref: '#/components/responses/Problem401'
        '404':
          $ref: '#/components/responses/Problem404'
        '412':
          $ref: '#/components/responses/Problem412'
        '428':
