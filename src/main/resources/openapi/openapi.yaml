  /intermediari/{idIntermediario}/stazioni:
    parameters:
      - $ref: '#/components/parameters/IdIntermediarioPath'
    get:
      tags:
        - Stazioni
      operationId: listStazioni
      summary: Elenca le stazioni di un intermediario (paginate).
      description: |
        Filtri opzionali e ortogonali (AND):
        - `codStazione` — match parziale;
        - `abilitato` — match esatto.

        **Paginazione** (offset): `?page=N&limit=L`. Di default la risposta
        valorizza `pagination` con `hasNextPage` (Slice, senza COUNT). Con
        `?total=true` vengono aggiunti `totalResults` e `totalPages` (Page).

        Ordinamento via `?sort=campo` (prefisso `-` per DESC, `+` o nessun
        prefisso per ASC); campi ammessi: `codStazione`. Default `codStazione` (ASC).
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Total'
        - $ref: '#/components/parameters/CodStazione'
        - $ref: '#/components/parameters/Abilitato'
      responses:
        '200':
          description: Lista paginata di stazioni.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      results:
                        type: array
                        items:
                          $ref: '#/components/schemas/StazioneSummary'
        '400':
          description: Parametro di paginazione, ordinamento o filtro non valido.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Autenticazione mancante o non valida.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: Intermediario non trovato.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
    post:
      tags:
        - Stazioni
      operationId: createStazione
      summary: Crea una nuova stazione per l'intermediario.
      description: |
        Crea la stazione identificata da `idStazione`. L'`idStazione` deve avere
        formato `{idIntermediario}_{applicationCode}`, dove `applicationCode` e'
        un intero compreso tra 1 e 99; l'`application_code` viene derivato da
        questo suffisso. Formato non valido → 422.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StazioneCreate'
      responses:
        '201':
          description: Stazione creata.
          headers:
            Location:
              description: URI della nuova stazione.
              schema:
                type: string
            ETag:
              description: Validatore di concorrenza della rappresentazione creata.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stazione'
        '400':
          description: Body non valido.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Autenticazione mancante o non valida.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: Intermediario non trovato.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '409':
          description: Esiste gia' una stazione con lo stesso `idStazione`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          description: '`idStazione` non coerente con `idIntermediario` o `applicationCode` fuori range 1-99.'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

