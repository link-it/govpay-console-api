openapi: 3.0.3
info:
  title: GovPay Console API
  version: 2.0.0-SNAPSHOT
  description: |
    API consumata dalla web-console GovPay per le funzionalita' di backoffice
    (configurazione, impostazioni, manutenzione, consultazione).
  contact:
    name: GitHub Project Page
    url: 'https://github.com/link-it/govpay-console-api/'
  license:
    name: GPL
    url: 'https://github.com/link-it/govpay-console-api/blob/master/LICENSE'

servers:
  - url: /govpay/console-api

tags:
  - name: Pendenze
    description: Pagamenti in attesa e spontanei.
  - name: Ricevute
    description: Consultazione delle ricevute telematiche (RT) emesse da pagoPA.
  - name: Profilo
    description: Profilo dell'utenza autenticata corrente.
  - name: Autenticazione
    description: Endpoint di login, logout e discovery dei metodi di autenticazione.
  - name: Intermediari
    description: Anagrafica degli intermediari pagoPA.
  - name: Stazioni
    description: Anagrafica delle stazioni di un intermediario.
  - name: Connettori
    description: Connettori pagoPA di un intermediario (uno per canale).
  - name: Entrate
    description: Anagrafica di sistema delle tipologie di entrata.
  - name: TipiPendenza
    description: Anagrafica di sistema delle tipologie di pendenza.
  - name: Domini
    description: Anagrafica degli enti creditori (domini).

paths:

  /profilo:
    get:
      tags:
        - Profilo
      operationId: getProfilo
      summary: Profilo dell'utenza autenticata corrente.
      description: |
        Ritorna nome, principal, metodo di autenticazione applicato, domini
        e tipi pendenza su cui l'utenza opera, ruoli e ACL piatte.

        Issue link-it/govpay-console-api#10 scope B. Cache-Control:
        `private, max-age=60` (dato personale, niente caching condiviso).
      responses:
        '200':
          description: Profilo dell'utenza autenticata.
          headers:
            Cache-Control:
              description: 'private, max-age=60'
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profilo'
        '401':
          description: Autenticazione mancante o non valida.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /auth/login:
    post:
      tags:
        - Autenticazione
      operationId: login
      summary: Login con credenziali username/password.
      description: |
        Autentica l'utenza tramite credenziali in body JSON e crea una
        sessione lato server. La response porta il `Profilo` dell'utenza
        appena autenticata (evita un secondo round-trip a `GET /profilo`)
        e setta i cookie `JSESSIONID` (sessione) e `XSRF-TOKEN` (CSRF).

        Issue link-it/govpay-console-api#10 scope C. Limitazione anti
        brute-force: rate-limit per IP del chiamante.

        Audit `gp_audit`:
        - Successo → `PROFILO_LOGIN` con `dettaglio.metodo = FORM`.
        - Fallimento (per principal noto) → `PROFILO_LOGIN_FAILED` con
          `dettaglio.motivo` ∈ {BAD_CREDENTIALS, DISABLED, RATE_LIMITED}.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RichiestaLogin'
      responses:
        '200':
          description: |
            Login riuscito. Cookie di sessione (`JSESSIONID`) e CSRF
            (`XSRF-TOKEN`) impostati. Body con il profilo utente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profilo'
        '400':
          description: Body JSON malformato o campi obbligatori mancanti.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Credenziali non valide o utenza disabilitata.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '429':
          description: |
            Troppi tentativi di login dallo stesso IP. Riprovare piu' tardi.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /auth/methods:
    get:
      tags:
        - Autenticazione
      operationId: getAuthMethods
      summary: Metodi di autenticazione attivi sul server.
      description: |
        Discovery dei metodi di autenticazione abilitati lato server, cosi'
        il frontend puo' renderizzare i pulsanti di login senza hard-coding.

        **Endpoint pubblico** (no auth). `Cache-Control: public, max-age=300`
        perche' la risposta dipende solo dalla configurazione lato server e
        un short TTL evita round-trip ridondanti.

        Issue link-it/govpay-console-api#10 scope E.
      responses:
        '200':
          description: Lista dei metodi attivi.
          headers:
            Cache-Control:
              description: 'public, max-age=300'
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetodiAutenticazione'

  /auth/logout:
    post:
      tags:
        - Autenticazione
      operationId: logout
      summary: Logout esplicito (invalidazione sessione).
      description: |
        Invalida la sessione lato server e cancella i cookie `JSESSIONID`
        e `XSRF-TOKEN`. Richiede header CSRF (`X-XSRF-TOKEN`) coerente con
        il cookie quando la richiesta porta una sessione attiva e nessun
        header `Authorization` (CSRF condizionale).

        **Semantica idempotente**: ritorna `204` anche quando non c'e' una
        sessione da invalidare (es. retry dopo timeout client, doppio click
        sul pulsante di logout). L'audit `PROFILO_LOGOUT` viene scritto
        solo se il principal era effettivamente autenticato; altrimenti
        l'operazione e' un no-op silenzioso.

        Issue link-it/govpay-console-api#10 scope D. Audit `gp_audit`:
        `PROFILO_LOGOUT` con `dettaglio.motivo = USER_REQUEST` (principal
        catturato pre-clear del context).
      responses:
        '204':
          description: |
            Logout effettuato (o no-op idempotente se non c'era sessione).
        '403':
          description: |
            Token CSRF mancante o non coerente. Si verifica solo se la
            richiesta porta una sessione attiva e nessun header
            `Authorization` (CSRF e' condizionale).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /ricevute:
    get:
      tags:
        - Ricevute
      operationId: listRicevute
      summary: Elenca le ricevute telematiche (RT) visibili all'operatore (paginate).
      description: |
        Consultazione read-only delle ricevute telematiche emesse da pagoPA.
        Restituisce solo metadati tecnico-finanziari (`RicevutaSummary`): nessun
        dato personale, quindi la lista non genera audit GDPR.

        Filtri supportati in Fase 1:
        - `iuv` — match esatto;
        - `idDominio` — match esatto, 11 cifre;
        - `idRicevuta` — match esatto (era `ccp` in V1);
        - `dataDa` / `dataA` — intervallo (incluso) sulla data di pagamento.

        Tutti i filtri sono opzionali e in AND. I numerosi filtri V1 non ancora
        supportati (`idA2A`, `idPendenza`, `esito`, `dataRptDa`/`dataRptA`,
        `tassonomia`, `idDebitore`/`identificativoDebitore`, ...) ritornano 400
        problem+json.

        ACL: il filtro per dominio/UO dell'operatore corrente viene applicato
        silenziosamente; un operatore senza visibilita' riceve lista vuota (mai 403).

        **Paginazione**: due modalita' mutuamente esclusive.
        - **offset** (default): `?page=N&limit=L`; risposta con `pagination`.
        - **cursor** (opt-in): `?cursor=<opaco>`; risposta con `nextCursor`,
          ordinamento fisso `(dataPagamento DESC, id DESC)`.
        In modalita' cursor `page` esplicito, `sort` esplicito o `total=true`
        generano 400 con motivazione parlante. Cursor malformato → 400.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Total'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/IuvFilter'
        - $ref: '#/components/parameters/IdDominio'
        - $ref: '#/components/parameters/IdRicevutaFilter'
        - $ref: '#/components/parameters/DataDa'
        - $ref: '#/components/parameters/DataA'
      responses:
        '200':
          description: Lista paginata di ricevute.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      results:
                        type: array
                        items:
                          $ref: '#/components/schemas/RicevutaSummary'
        '400':
          description: Filtro non supportato, parametro malformato o `limit > 200`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Autenticazione mancante o non valida.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /ricevute/{idDominio}/{iuv}/{idRicevuta}:
    get:
      tags:
        - Ricevute
      operationId: getRicevuta
      summary: Dettaglio di una ricevuta telematica.
      description: |
        Restituisce il dettaglio canonico (`Ricevuta`) identificato dalla tupla
        `(idDominio, iuv, idRicevuta)`. Il body include la conversione JSON di
        `rpt` e `rt` (anagrafica del soggetto pagatore annidata): ogni 200 viene
        tracciato in `gp_audit` (azione `RICEVUTA_VISUALIZZA`).

        404 problem+json se la RT non esiste o se l'ACL dell'operatore non ne
        consente la visibilità (anti-leak). Il 404 non genera audit.
      parameters:
        - $ref: '#/components/parameters/IdDominioPath'
        - $ref: '#/components/parameters/IuvPath'
        - $ref: '#/components/parameters/IdRicevutaPath'
      responses:
        '200':
          description: Dettaglio della ricevuta.
          headers:
            Cache-Control:
              description: Politica di cache privata.
              schema:
                type: string
                example: "private, max-age=60"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ricevuta'
        '401':
          description: Autenticazione mancante o non valida.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: Ricevuta non trovata o non visibile.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /ricevute/{idDominio}/{iuv}/{idRicevuta}/rpt:
    get:
      tags:
        - Ricevute
      operationId: getRicevutaRpt
      summary: Richiesta di Pagamento Telematica (RPT) di una ricevuta.
      description: |
        Ritorna la RPT della ricevuta nel formato richiesto via `Accept`:
        - `application/json` (default) → RPT convertita in JSON (stesso valore di
          `Ricevuta.rpt`);
        - `application/xml` → XML originale della RPT, byte-per-byte dal DB.

        Il formato PDF non è disponibile per la RPT: il servizio di stampa
        (govpay-stampe) genera solo la ricevuta (RT), non la richiesta. La stampa
        PDF è quindi offerta sul solo sub-resource `/rt`; un `Accept:
        application/pdf` su `/rpt` ottiene 406.

        404 se la RPT non esiste, non è visibile (ACL anti-leak) o non è disponibile
        (RT acquisita in standin). Ogni 200 traccia `RICEVUTA_VISUALIZZA`
        (`risorsa=rpt`, `formato`).
      parameters:
        - $ref: '#/components/parameters/IdDominioPath'
        - $ref: '#/components/parameters/IuvPath'
        - $ref: '#/components/parameters/IdRicevutaPath'
      responses:
        '200':
          description: RPT nel formato richiesto.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
            application/xml:
              schema:
                type: string
                format: binary
        '401':
          description: Autenticazione mancante o non valida.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: RPT non trovata, non visibile o non disponibile.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '406':
          description: Formato richiesto non supportato.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /ricevute/{idDominio}/{iuv}/{idRicevuta}/rt:
    get:
      tags:
        - Ricevute
      operationId: getRicevutaRt
      summary: Ricevuta Telematica (RT) di una ricevuta.
      description: |
        Ritorna la RT nel formato richiesto via `Accept`:
        - `application/json` (default) → RT convertita in JSON (stesso valore di
          `Ricevuta.rt`);
        - `application/xml` → XML originale della RT, byte-per-byte dal DB;
        - `application/pdf` → stampa binaria via microservizio govpay-stampe.

        404 se la RT non esiste o non è visibile (ACL anti-leak). 406 se `Accept`
        non supportato. 502 se govpay-stampe è irraggiungibile (solo PDF). Ogni 200
        traccia `RICEVUTA_VISUALIZZA` (`risorsa=rt`, `formato`).
      parameters:
        - $ref: '#/components/parameters/IdDominioPath'
        - $ref: '#/components/parameters/IuvPath'
        - $ref: '#/components/parameters/IdRicevutaPath'
      responses:
        '200':
          description: RT nel formato richiesto.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
            application/xml:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          description: Autenticazione mancante o non valida.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: RT non trovata o non visibile.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '406':
          description: Formato richiesto non supportato.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '502':
          description: Microservizio govpay-stampe irraggiungibile (solo PDF).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /pendenze:
    get:
      tags:
        - Pendenze
      operationId: listPendenze
      summary: Elenca le pendenze visibili all'operatore autenticato (paginate).
      description: |
        Filtri supportati in Fase 1 (Issue #9):
        - `idPendenza` — partial match;
        - `numeroAvviso` — match esatto, 18 cifre;
        - `idDominio` — match esatto, 11 caratteri;
        - `identificativoDebitore` — match esatto.

        Tutti i filtri sono opzionali e ortogonali (AND). I filtri V1 non
        ancora supportati (`idA2A`, `iuv`, `stato`, `tipoPendenza`, `dataDa`,
        `dataA`, `direzione`, `divisione`, `idDebitore`, `mostraSpontaneiNonPagati`)
        ritornano 400 problem+json.

        ACL: il filtro per dominio dell'operatore corrente viene applicato
        silenziosamente; un operatore senza visibilita' su alcun dominio riceve
        una lista vuota (mai 403).

        Quando `identificativoDebitore` e' valorizzato la richiesta viene
        registrata in `gp_audit` (azione `PENDENZE_RICERCA_PER_DEBITORE`).

        **Paginazione**: due modalita' mutuamente esclusive.
        - **offset** (default): `?page=N&limit=L`; risposta con `pagination` valorizzato.
        - **cursor** (opt-in): `?cursor=<opaco>`; risposta con `nextCursor`,
          ordinamento fisso `(dataOraUltimoAggiornamento DESC, id DESC)`.
        In modalita' cursor `page` esplicito, `sort` esplicito o `total=true`
        generano 400 problem+json con motivazione parlante. Cursor malformato
        → 400.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Total'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/IdPendenza'
        - $ref: '#/components/parameters/NumeroAvviso'
        - $ref: '#/components/parameters/IdDominio'
        - $ref: '#/components/parameters/IdentificativoDebitore'
      responses:
        '200':
          description: Lista paginata di pendenze.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      results:
                        type: array
                        items:
                          $ref: '#/components/schemas/PendenzaSummary'
        '400':
          description: Filtro non supportato, parametro malformato o `limit > 200`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Autenticazione mancante o non valida.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /pendenze/{idA2A}/{idPendenza}:
    get:
      tags:
        - Pendenze
      operationId: getPendenza
      summary: Dettaglio di una pendenza, comprensivo di voci embedded e _links condizionali.
      description: |
        Restituisce la pendenza identificata da `(idA2A, idPendenza)`. Le `voci`
        sono sempre embedded inline (max 5).

        `_links`:
        - `informazioniDebitore` sempre presente;
        - `ricevute` sempre presente (la lista e' eventualmente vuota);
        - `avviso` presente solo se `numeroAvviso != null`.

        `?expand=datiAllegati,proprieta` consente di includere sotto-tree
        opt-in nel body. Valori sconosciuti causano 400.

        ACL: se l'operatore non ha visibilita' sul dominio della pendenza,
        viene restituito 404 (no leak di esistenza, mai 403).
      parameters:
        - name: idA2A
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        - name: idPendenza
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        - name: expand
          in: query
          required: false
          description: Sotto-tree opt-in (CSV) da espandere nel body.
          style: form
          explode: false
          schema:
            type: array
            uniqueItems: true
            items:
              $ref: '#/components/schemas/PendenzaExpand'
      responses:
        '200':
          description: Dettaglio pendenza.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pendenza'
        '400':
          description: Parametri non validi (es. valori di `expand` sconosciuti).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Autenticazione mancante o non valida.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: Pendenza non trovata o non visibile per l'operatore corrente.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /pendenze/{idA2A}/{idPendenza}/avviso:
    get:
      tags:
        - Pendenze
      operationId: getPendenzaAvviso
      summary: Avviso di pagamento associato a una pendenza.
      description: |
        Ritorna l'avviso di pagamento associato alla pendenza identificata da
        `(idA2A, idPendenza)`. Il backend deriva `(idDominio, numeroAvviso)` dalla
        pendenza, evitando al client il lookup esplicito.

        Content negotiation tramite header `Accept`:
        - `application/json` (default) → metadati locali dell'avviso (`Avviso`);
        - `application/pdf` → stampa binaria generata dal microservizio
          `govpay-stampe`. Endpoint allineato a V1 `/avvisi/{idDominio}/{numeroAvviso}`:
          genera il PDF dell'avviso della singola pendenza anche quando
          appartiene a un documento multi-rata. Il PDF aggregato dell'intero
          documento e' una feature distinta, oggetto di issue dedicata.

        ACL: se l'operatore non ha visibilita' sul dominio della pendenza,
        viene restituito 404 (no leak di esistenza). Se la pendenza non ha
        `numeroAvviso` (es. pendenza spontanea non ancora avvisata) viene
        restituito 404.
      parameters:
        - name: idA2A
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        - name: idPendenza
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        - name: linguaSecondaria
          in: query
          required: false
          description: |
            Lingua secondaria per la stampa bilingue dell'avviso. Significativa
            solo in `application/pdf`. Vedi schema `LinguaSecondaria`.
          schema:
            $ref: '#/components/schemas/LinguaSecondaria'
      responses:
        '200':
          description: Avviso (formato dipende dall'header `Accept`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Avviso'
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          description: Autenticazione mancante o non valida.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: |
            Pendenza non trovata, non visibile per l'operatore corrente, oppure
            priva di `numeroAvviso`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '406':
          description: |
            Header `Accept` non compatibile con `application/json` o `application/pdf`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          description: |
            Avviso PDF non applicabile a questa pendenza (Marca da Bollo Telematica).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '502':
          description: Errore di comunicazione con il microservizio `govpay-stampe`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '503':
          description: Microservizio `govpay-stampe` non configurato (`app.stampe.base-url` mancante).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /pendenze/{idA2A}/{idPendenza}/informazioniDebitore:
    get:
      tags:
        - Pendenze
      operationId: getInformazioniDebitore
      summary: Dati anagrafici e contatti del debitore associato alla pendenza.
      description: |
        Ritorna l'oggetto `Soggetto` completo (dati anagrafici e contatti del
        soggetto pagatore). Endpoint separato dal dettaglio pendenza per
        minimizzare l'esposizione di dati personali (scope F della issue #9).

        ACL: se l'operatore non ha visibilita' sul dominio della pendenza,
        viene restituito 404 (no leak di esistenza).

        **Audit GDPR**: ogni 200 scrive una riga in `gp_audit` con azione
        `PENDENZA_VISUALIZZA_DEBITORE`, dettaglio JSON
        `{idA2A, idPendenza, identificativoDebitore}` e IP del richiedente
        (dal primo elemento di `X-Forwarded-For` se presente, altrimenti
        `request.getRemoteAddr()`).
      parameters:
        - name: idA2A
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9\-_]{1,35}$'
        - name: idPendenza
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9\-_]{1,35}$'
      responses:
        '200':
          description: Soggetto pagatore.
          content:
            application/json:
