  /entrate:
    get:
      tags:
        - Entrate
      operationId: listEntrate
      summary: Elenca le tipologie di entrata (paginate).
      description: |
        Filtri opzionali e ortogonali (AND):
        - `idEntrata` — match parziale sul codice entrata;
        - `descrizione` — match parziale.

        **Paginazione** (offset): `?page=N&limit=L`. Di default la risposta
        valorizza `pagination` con `hasNextPage` (modalita' Slice, senza COUNT).
        Con `?total=true` vengono aggiunti `totalResults` e `totalPages`.

        Ordinamento via `?sort=campo` (prefisso `-` per DESC, `+` o nessun
        prefisso per ASC); campi ammessi: `idEntrata`, `descrizione`.
        Default `idEntrata` (ASC).
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Total'
        - $ref: '#/components/parameters/IdEntrataFilter'
        - $ref: '#/components/parameters/Descrizione'
      responses:
        '200':
          description: Lista paginata di tipologie di entrata.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      results:
                        type: array
                        items:
                          $ref: '#/components/schemas/EntrataSummary'
        '400':
          $ref: '#/components/responses/Problem400'
        '401':
          $ref: '#/components/responses/Problem401'
    post:
      tags:
        - Entrate
      operationId: createEntrata
      summary: Crea una nuova tipologia di entrata.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntrataCreate'
      responses:
        '201':
          description: Tipologia di entrata creata.
          headers:
            Location:
              description: URI della nuova tipologia di entrata.
              schema:
                type: string
            ETag:
              description: Validatore di concorrenza della rappresentazione creata.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entrata'
        '400':
          $ref: '#/components/responses/Problem400'
        '401':
          $ref: '#/components/responses/Problem401'
        '409':
          $ref: '#/components/responses/Problem409'

  /entrate/{idEntrata}:
    parameters:
      - $ref: '#/components/parameters/IdEntrataPath'
    get:
      tags:
        - Entrate
      operationId: getEntrata
      summary: Dettaglio di una tipologia di entrata.
      description: |
        Restituisce la tipologia di entrata identificata da `idEntrata`, con header
        `ETag` da rispedire come `If-Match` nelle operazioni di modifica.
      responses:
        '200':
          description: Dettaglio tipologia di entrata.
